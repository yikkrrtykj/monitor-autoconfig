services:
  mysql:
    image: mariadb:10.5
    container_name: mysql
    restart: unless-stopped
    command:
      - "mysqld"
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_bin"
      - "--log-bin-trust-function-creators=1"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: root
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  librenms-db:
    image: mariadb:10.5
    container_name: librenms-db
    restart: unless-stopped
    command:
      - "mysqld"
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: librenms_root
      MYSQL_DATABASE: librenms
      MYSQL_USER: librenms
      MYSQL_PASSWORD: librenms
    volumes:
      - ./librenms-db-data:/var/lib/mysql
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plibrenms_root"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  librenms-redis:
    image: redis:7.2-alpine
    container_name: librenms-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  librenms-rrdcached:
    image: crazymax/rrdcached:latest
    container_name: librenms-rrdcached
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PUID: 1000
      PGID: 1000
      WRITE_TIMEOUT: 300
      WRITE_JITTER: 180
      WRITE_THREADS: 4
    volumes:
      - ./librenms-data/rrd:/data/db
      - ./librenms-rrdcached-journal:/data/journal
    networks:
      - monitor

  init-permissions:
    image: alpine:latest
    container_name: init-permissions
    volumes:
      - ./mysql-data:/mysql-data
      - ./zabbix-server-data:/zabbix-server-data
      - ./grafana-data:/grafana-data
      - ./prometheus-data:/prometheus-data
      - ./uptime-kuma-data:/uptime-kuma-data
      - ./librenms-db-data:/librenms-db-data
      - ./librenms-data:/librenms-data
      - ./librenms-rrdcached-journal:/librenms-rrdcached-journal
    command: |
      sh -c '
        echo "Setting up directory permissions..."
        mkdir -p /mysql-data /zabbix-server-data /grafana-data /prometheus-data /uptime-kuma-data /librenms-db-data /librenms-data /librenms-data/rrd /librenms-rrdcached-journal
        chown -R 999:999 /mysql-data /librenms-db-data
        chown -R 1997:1997 /zabbix-server-data
        chown -R 472:472 /grafana-data
        chown -R 65534:65534 /prometheus-data
        chown -R 1000:1000 /librenms-data /librenms-rrdcached-journal
        chmod -R 755 /mysql-data /zabbix-server-data /grafana-data /prometheus-data /uptime-kuma-data /librenms-db-data /librenms-data
        chmod -R 775 /librenms-data/rrd /librenms-rrdcached-journal
        echo "Permissions set successfully"
      '
    networks:
      - monitor
    restart: "no"

  zabbix-server:
    image: zabbix/zabbix-server-mysql:7.0-ubuntu-latest
    container_name: zabbix-server
    hostname: zabbix-server
    restart: unless-stopped
    user: root
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: root
      ZBX_ENABLE_SNMP_TRAPS: "true"
      ZBX_STARTPOLLERS: 5
      ZBX_STARTPOLLERSUNREACHABLE: 1
      ZBX_STARTTRAPPERS: 5
      ZBX_STARTPINGERS: 1
      ZBX_STARTDISCOVERERS: 1
      ZBX_STARTHTTPPOLLERS: 1
      ZBX_TIMEOUT: 30
      ZBX_UNREACHABLEPERIOD: 45
      ZBX_UNAVAILABLEDELAY: 60
    command: >
      /bin/sh -c '
        apt-get update &&
        apt-get install -y python3 python3-requests &&
        chmod +x /usr/lib/zabbix/alertscripts/feishu-robot.py &&
        /usr/bin/docker-entrypoint.sh /usr/sbin/zabbix_server --foreground -c /etc/zabbix/zabbix_server.conf
      '
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
    ports:
      - "${ZABBIX_SERVER_PORT:-10051}:10051"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./zabbix-server-data:/var/lib/zabbix
      - ./feishu-robot.py:/usr/lib/zabbix/alertscripts/feishu-robot.py
      - ./watchguard-firewall-zabbix7.0-template.yaml:/watchguard-firewall-zabbix7.0-template.yaml:ro
      - ./hillstone-zabbix7.0-UnofficialV1.1.yaml:/hillstone-zabbix7.0-UnofficialV1.1.yaml:ro
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[z]abbix_server' | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:7.0-ubuntu-latest
    container_name: zabbix-web
    restart: unless-stopped
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: root
      PHP_TZ: Asia/Shanghai
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      ZBX_POSTMAXSIZE: 64M
      ZBX_UPLOADMAXFILESIZE: 2M
      ZBX_MAXEXECUTIONTIME: 600
      ZBX_DEFAULT_LANG: zh_CN
      LANG: zh_CN.UTF-8
      LC_ALL: zh_CN.UTF-8
      TZ: Asia/Shanghai
    depends_on:
      zabbix-server:
        condition: service_healthy
    ports:
      - "${ZABBIX_WEB_PORT:-8001}:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - monitor

  zabbix-agent:
    image: zabbix/zabbix-agent:7.0-ubuntu-latest
    container_name: zabbix-agent
    hostname: zabbix-agent
    restart: unless-stopped
    environment:
      ZBX_HOSTNAME: "Zabbix server"
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      ZBX_PASSIVE_ALLOW: "true"
      ZBX_ACTIVE_ALLOW: "true"
      ZBX_METADATA: "Linux"
      ZBX_SERVER: zabbix-server
      ZBX_SERVERACTIVE: zabbix-server:10051
      ZBX_TIMEOUT: 30
      ZBX_LISTENPORT: 10050
      ZBX_LISTENIP: "0.0.0.0"
    depends_on:
      zabbix-server:
        condition: service_healthy
    ports:
      - "${ZABBIX_AGENT_PORT:-10050}:10050"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[z]abbix_agentd' | wc -l | grep -q '^[1-9]' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  zabbix-config:
    image: alpine:latest
    container_name: zabbix-config
    depends_on:
      zabbix-web:
        condition: service_started
      zabbix-server:
        condition: service_healthy
      zabbix-agent:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./zabbix-auto-config.sh:/zabbix-auto-config.sh:ro
      - ./feishu-robot.py:/feishu-robot.py:ro
      - ./hillstone-zabbix7.0-UnofficialV1.1.yaml:/hillstone-zabbix7.0-UnofficialV1.1.yaml:ro
      - ./watchguard-firewall-zabbix7.0-template.yaml:/watchguard-firewall-zabbix7.0-template.yaml:ro
    networks:
      - monitor
    restart: "no"
    environment:
      TZ: Asia/Shanghai
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      SWITCH_DISCOVERY_RANGE: "${SWITCH_DISCOVERY_RANGE:-192.168.10.1-100,192.168.10.254}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl jq bash python3 py3-requests mysql-client
        echo "Waiting for Zabbix services to be ready..."
        sleep 60
        echo "Checking Zabbix API availability..."
        for i in $$(seq 1 60); do
          if curl -s -f http://zabbix-web:8080/api_jsonrpc.php > /dev/null 2>&1; then
            echo "Zabbix API is available"
            break
          fi
          echo "Waiting for Zabbix API... (attempt $$i/60)"
          sleep 5
        done
        echo "Ensuring database is fully initialized..."
        sleep 30
        # Immediate fix for Agent connection issues
        for i in $$(seq 1 30); do
          AUTH_TOKEN=$$(curl -s -X POST http://zabbix-web:8080/api_jsonrpc.php \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"user.login","params":{"username":"Admin","password":"zabbix"},"id":1}' 2>/dev/null | \
            jq -r '.result' 2>/dev/null)
          if [ "$$AUTH_TOKEN" != "null" ] && [ -n "$$AUTH_TOKEN" ] && [ "$$AUTH_TOKEN" != "" ]; then
            echo "Successfully authenticated with Zabbix API"
            break
          fi
          sleep 5
        done
        if [ "$$AUTH_TOKEN" != "null" ] && [ -n "$$AUTH_TOKEN" ]; then
          HOSTS_WITH_LOCALHOST=$$(curl -s -X POST http://zabbix-web:8080/api_jsonrpc.php \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"2.0\",\"method\":\"host.get\",\"params\":{\"selectInterfaces\":\"extend\",\"filter\":{\"status\":\"0\"}},\"auth\":\"$$AUTH_TOKEN\",\"id\":1}" | \
            jq -r '.result[] | select(.interfaces[]?.ip == "127.0.0.1") | .hostid')
          if [ -n "$$HOSTS_WITH_LOCALHOST" ]; then
            for hostid in $$HOSTS_WITH_LOCALHOST; do
              curl -s -X POST http://zabbix-web:8080/api_jsonrpc.php \
                -H "Content-Type: application/json" \
                -d "{\"jsonrpc\":\"2.0\",\"method\":\"host.update\",\"params\":{\"hostid\":\"$$hostid\",\"interfaces\":[{\"type\":1,\"main\":1,\"useip\":0,\"dns\":\"zabbix-agent\",\"port\":\"10050\"}]},\"auth\":\"$$AUTH_TOKEN\",\"id\":1}" > /dev/null
              echo "Fixed host $$hostid interface to use zabbix-agent"
            done
          fi
        fi
        echo "Starting full Zabbix configuration..."
        sleep 30
        for attempt in $$(seq 1 3); do
          echo "Running zabbix-auto-config.sh (attempt $$attempt/3)..."
          if bash /zabbix-auto-config.sh; then
            echo "Configuration completed successfully"
            exit 0
          else
            sleep 30
          fi
        done
        exit 1

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PROMETHEUS_SNMP_TARGETS: "${PROMETHEUS_SNMP_TARGETS:-192.168.10.254,192.168.10.11-16}"
      PROMETHEUS_PING_TARGETS: "${PROMETHEUS_PING_TARGETS:-192.168.10.254,192.168.10.11-16}"
      PROMETHEUS_SNMP_AUTH: "${PROMETHEUS_SNMP_AUTH:-global}"
      PROMETHEUS_SCRAPE_INTERVAL: "${PROMETHEUS_SCRAPE_INTERVAL:-30s}"
      PROMETHEUS_RETENTION_TIME: "${PROMETHEUS_RETENTION_TIME:-15d}"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus-gen-config.sh:/etc/prometheus/prometheus-gen-config.sh:ro
      - /etc/localtime:/etc/localtime:ro
    entrypoint:
      - /bin/sh
      - /etc/prometheus/prometheus-gen-config.sh
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "${SNMP_EXPORTER_BIND:-127.0.0.1}:${SNMP_EXPORTER_PORT:-9116}:9116"
    networks:
      - monitor
    volumes:
      - './snmp.yml:/etc/snmp_exporter/snmp.yml'

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "${BLACKBOX_EXPORTER_BIND:-127.0.0.1}:${BLACKBOX_EXPORTER_PORT:-9115}:9115"
    networks:
      - monitor
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /etc/blackbox_exporter/config.yml << 'EOF'
        modules:
          icmp:
            prober: icmp
            timeout: 5s
            icmp:
              preferred_ip_protocol: ip4
          http_2xx:
            prober: http
            timeout: 5s
            http:
              valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
              valid_status_codes: []
              method: GET
              preferred_ip_protocol: ip4
        EOF
        exec /bin/blackbox_exporter --config.file=/etc/blackbox_exporter/config.yml

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./uptime-kuma-data:/app/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3001:3001"
    networks:
      - monitor
    depends_on:
      init-permissions:
        condition: service_completed_successfully

  librenms:
    image: librenms/librenms:latest
    container_name: librenms
    restart: unless-stopped
    hostname: librenms
    depends_on:
      librenms-db:
        condition: service_healthy
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      POLLERS: 4
      LIBRENMS_SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-192.168.10.254}"
      LIBRENMS_STAGE_START_OCTET: "${LIBRENMS_STAGE_START_OCTET:-11}"
      LIBRENMS_DISCOVERY_TARGETS: "${LIBRENMS_DISCOVERY_TARGETS:-192.168.10.1-100,192.168.10.254}"
      SNMP_TIMEOUT: "${SNMP_TIMEOUT:-1}"
      SNMP_RETRIES: "${SNMP_RETRIES:-0}"
      LIBRENMS_ADMIN_USER: "${LIBRENMS_ADMIN_USER:-admin}"
      LIBRENMS_ADMIN_PASSWORD: "${LIBRENMS_ADMIN_PASSWORD:-admin}"
      LIBRENMS_ADMIN_EMAIL: "${LIBRENMS_ADMIN_EMAIL:-admin@example.com}"
      LIBRENMS_OWN_HOSTNAME: "${SERVER_IP:-}"
      PUID: 1000
      PGID: 1000
    volumes:
      - ./librenms-data:/data
      - ./librenms-patch-nginx.sh:/etc/cont-init.d/01-patch-nginx.sh:ro
    ports:
      - "${LIBRENMS_PORT:-8002}:8000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - monitor

  librenms-dispatcher:
    image: librenms/librenms:latest
    container_name: librenms-dispatcher
    hostname: librenms-dispatcher
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      librenms:
        condition: service_started
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    volumes:
      - ./librenms-data:/data
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      DISPATCHER_NODE_ID: "${LIBRENMS_DISPATCHER_NODE_ID:-dispatcher1}"
      SIDECAR_DISPATCHER: 1
      PUID: 1000
      PGID: 1000
    networks:
      - monitor

  librenms-scheduler:
    image: librenms/librenms:latest
    container_name: librenms-scheduler
    hostname: librenms-scheduler
    restart: unless-stopped
    depends_on:
      librenms:
        condition: service_started
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    volumes:
      - ./librenms-data:/data
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      PUID: 1000
      PGID: 1000
    entrypoint:
      - /bin/sh
      - -c
    command: |
      echo "Starting LibreNMS scheduler loop..."
      while true; do
        sudo -u librenms php /opt/librenms/artisan schedule:run --no-ansi --no-interaction || true
        sleep 60
      done
    networks:
      - monitor

  librenms-config:
    image: librenms/librenms:latest
    container_name: librenms-config
    depends_on:
      librenms:
        condition: service_started
      librenms-dispatcher:
        condition: service_started
      librenms-scheduler:
        condition: service_started
    networks:
      - monitor
    restart: "no"
    volumes:
      - ./librenms-data:/data
      - ./librenms-auto-config.sh:/librenms-auto-config.sh:ro
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://localhost:8002}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      LIBRENMS_SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-192.168.10.254}"
      LIBRENMS_STAGE_START_OCTET: "${LIBRENMS_STAGE_START_OCTET:-11}"
      LIBRENMS_DISCOVERY_TARGETS: "${LIBRENMS_DISCOVERY_TARGETS:-192.168.10.1-100,192.168.10.254}"
      SNMP_TIMEOUT: "${SNMP_TIMEOUT:-1}"
      SNMP_RETRIES: "${SNMP_RETRIES:-0}"
      LIBRENMS_ADMIN_USER: "${LIBRENMS_ADMIN_USER:-admin}"
      LIBRENMS_ADMIN_PASSWORD: "${LIBRENMS_ADMIN_PASSWORD:-admin}"
      LIBRENMS_ADMIN_EMAIL: "${LIBRENMS_ADMIN_EMAIL:-admin@example.com}"
      LIBRENMS_OWN_HOSTNAME: "${SERVER_IP:-}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for LibreNMS to fully initialize..."
        sleep 30
        echo "Running LibreNMS auto-configuration..."
        chmod +x /librenms-auto-config.sh
        /bin/sh /librenms-auto-config.sh
        echo ""
        echo "UniFi APs: Add via SNMP in LibreNMS web UI (http://localhost:8002)"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: root
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_PROTOCOL: http
      GF_DEFAULT_LOCALE: zh-Hans
      GF_DEFAULT_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    networks:
      - monitor

  grafana-setup:
    image: alpine:latest
    container_name: grafana-setup
    depends_on:
      grafana:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - monitor
    restart: on-failure
    volumes:
      - ./grafana-setup.sh:/grafana-setup.sh:ro
    command: ["/bin/sh", "-c", "sleep 30 && /bin/sh /grafana-setup.sh"]

networks:
  monitor:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  mysql-data:
  zabbix-server-data:
  librenms-db-data:
  librenms-data:

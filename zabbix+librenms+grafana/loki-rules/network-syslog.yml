# 对设备 syslog 跑的关键字告警，命中 → Alertmanager → 飞书同事群。
# 设备名/详情在飞书卡片里单独成行，所以这里 description 不再重复设备名。
# 阈值/关键字按现场随时调，改完 docker compose restart loki。
groups:
  - name: network-syslog
    rules:
      # 同一个接口 1 分钟内反复 down ≥3 次才报（线路/端口/光模块问题）。
      # 不同接口各 down 一次（布场插拔）不会触发——按 (host, iface) 分组计数。
      - alert: InterfaceFlapping
        expr: |
          sum by (host, iface) (
            count_over_time({job="syslog"} |~ `(?i)(%LINK-[0-9]-UPDOWN|%LINEPROTO-5-UPDOWN).*to down` | regexp `Interface (?P<iface>[^,]+),` [1m])
          ) >= 3
        for: 0m
        labels:
          severity: warning
          component: syslog
        annotations:
          summary: "接口反复 up/down: {{ $labels.host }}"
          description: "1 分钟内 up/down ≥3 次（线路/端口/光模块可疑）"

      - alert: DeviceRebooted
        expr: |
          sum by (host) (count_over_time({job="syslog"} |~ `(?i)(%SYS-5-RESTART|%SYS-6-BOOTTIME|System restarted|reload requested)` [10m])) >= 1
        for: 0m
        labels:
          severity: critical
          component: syslog
        annotations:
          summary: "设备重启: {{ $labels.host }}"
          description: "上报了系统重启/重载日志"

      - alert: STPInstability
        expr: |
          sum by (host) (count_over_time({job="syslog"} |~ `(?i)%SPANTREE.*(LOOPGUARD|BLOCK|ROOTGUARD|New_root|root changed|TOPOTRAP)` [5m])) >= 1
        for: 0m
        labels:
          severity: warning
          component: syslog
        annotations:
          summary: "生成树异常: {{ $labels.host }}"
          description: "出现 STP 拓扑变更/环路/根桥变化"

      - alert: HardwareFault
        expr: |
          sum by (host) (count_over_time({job="syslog"} |~ `(?i)(power supply|PSU|FAN.?FAIL|fan.*fail|%PLATFORM.*(power|fan|temperature)|overheat|temperature.*(high|exceed|critical))` [10m])) >= 1
        for: 0m
        labels:
          severity: critical
          component: syslog
        annotations:
          summary: "硬件告警(电源/风扇/温度): {{ $labels.host }}"
          description: "上报了电源/风扇/温度相关故障日志"

      - alert: HighRateErrorSyslog
        expr: |
          sum by (host) (count_over_time({job="syslog", severity=~"emerg|alert|crit|err"} [5m])) > 30
        for: 2m
        labels:
          severity: warning
          component: syslog
        annotations:
          summary: "错误日志激增: {{ $labels.host }}"
          description: "5 分钟内 >30 条 error 及以上级别日志"

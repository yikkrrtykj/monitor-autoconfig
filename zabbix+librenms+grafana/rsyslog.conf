# 宽松的 syslog 收集器：思科/防火墙什么格式都收（RFC3164、带序列号等都行）。
# 收到后按「来源IP 严重级别 原始消息」写到一个文件，Promtail 再读它推给 Loki。
global(workDirectory="/tmp")

module(load="imudp")
input(type="imudp" port="514")
module(load="imtcp")
input(type="imtcp" port="514")

# 每行: <来源IP> <主机名> <严重级别> <去掉<PRI>的原始消息>
# 主机名要设备开 `logging origin-id hostname` 才有，否则 rsyslog 会回退成 IP/解析名。
template(name="lokiLine" type="string"
  string="%fromhost-ip% %hostname% %syslogseverity-text% %rawmsg-after-pri%\n")

*.* action(type="omfile" file="/var/log/remote/syslog.log"
           template="lokiLine" fileCreateMode="0644" dirCreateMode="0755")

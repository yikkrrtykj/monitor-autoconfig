<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>网络监控大屏</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./platform.css" />
  </head>
  <body>
    <main class="screen">
      <header class="topbar">
        <div class="brand" id="brand">
          <div class="brand-mark" id="brandMark" aria-hidden="true"></div>
          <div class="brand-text" id="logoText"></div>
        </div>
        <div class="headline">
          <h1 id="screenTitle">网络监控大屏</h1>
          <div id="screenSubtitle" class="subtitle"></div>
          <nav class="screen-nav" id="screenNav" aria-label="页面导航"></nav>
        </div>
        <time class="clock" aria-live="polite">
          <span id="dateText">---- -- --</span>
          <strong id="timeText">--:--:--</strong>
        </time>
      </header>

      <section class="panel-grid" id="panelGrid" aria-label="监控面板">
        <section class="panel custom-panel ping-panel" aria-labelledby="pingTitle">
          <h2 id="pingTitle">Ping</h2>
          <div class="gauge-grid" id="pingGaugeGrid"></div>
        </section>
        <section class="panel custom-panel uptime-panel" aria-labelledby="uptimeTitle">
          <h2 id="uptimeTitle">运行时长</h2>
          <div class="gauge-grid" id="uptimeGaugeGrid"></div>
        </section>
        <section class="chart-panel trend-panel" aria-labelledby="trendTitle">
          <h2 id="trendTitle">Ping 趋势</h2>
          <div class="chart-body" id="pingTrendChart"></div>
        </section>
        <section class="chart-panel loss-panel" aria-labelledby="lossTitle">
          <h2 id="lossTitle">丢包热力图</h2>
          <div class="chart-body" id="lossHeatmap"></div>
        </section>
        <div class="isp-grid" id="ispGrid"></div>
      </section>
      <section class="home-panel" id="homePanel" aria-label="大屏选择" hidden>
        <div class="home-shell">
          <div class="mode-grid" id="modeGrid"></div>
        </div>
      </section>
      <section class="tournament-panel" id="tournamentPanel" aria-label="比赛面板" hidden>
        <button type="button" class="tournament-refresh" id="tournamentRefresh" title="刷新" aria-label="手动刷新比赛面板">↻</button>
        <div class="tournament-summary" id="tournamentSummary"></div>
        <div class="tournament-board" id="tournamentBoard"></div>
        <section class="chart-panel tournament-trend-panel" aria-labelledby="tournamentTrendTitle">
          <h2 id="tournamentTrendTitle">选手延迟趋势</h2>
          <div class="chart-body" id="tournamentTrendChart"></div>
        </section>
      </section>
      <section class="evidence-panel" id="evidencePanel" aria-label="延迟查询" hidden>
        <form class="evidence-controls" id="evidenceForm">
          <label>队伍 <input id="evidenceTeam" type="number" min="1" max="16" value="1" /></label>
          <label>座位 <input id="evidenceSeat" type="number" min="1" max="5" value="1" /></label>
          <label>网络
            <select id="evidenceNetwork">
              <option value="wired">有线</option>
              <option value="wireless">无线</option>
              <option value="all">全部</option>
            </select>
          </label>
          <label>IP（填了优先按 IP 查，可查选手或基础设施任意设备） <input id="evidenceIp" type="text" /></label>
          <label>查询时间 <input id="evidenceAt" type="datetime-local" /></label>
          <label>查询范围
            <select id="evidenceWindow">
              <option value="5">前后 5 分钟</option>
              <option value="10">前后 10 分钟</option>
              <option value="15">前后 15 分钟</option>
              <option value="30">前后 30 分钟</option>
            </select>
          </label>
          <button type="submit">查询</button>
        </form>
        <div class="evidence-summary" id="evidenceSummary"></div>
        <section class="chart-panel evidence-latency-panel" aria-labelledby="evidenceLatencyTitle">
          <h2 id="evidenceLatencyTitle">延迟趋势</h2>
          <div class="chart-body" id="evidenceLatencyChart"></div>
        </section>
        <section class="chart-panel evidence-success-panel" aria-labelledby="evidenceSuccessTitle">
          <h2 id="evidenceSuccessTitle">在线状态</h2>
          <div class="chart-body" id="evidenceSuccessChart"></div>
        </section>
      </section>
      <section class="ops-panel" id="opsPanel" aria-label="现场核对" hidden>
        <div class="ops-controls" id="opsControls"></div>
        <div class="ops-summary" id="opsSummary"></div>
        <div class="ops-board" id="opsBoard"></div>
      </section>
      <section class="heatmap-panel" id="heatmapPanel" aria-label="质量热图" hidden>
        <form class="heatmap-controls" id="heatmapForm">
          <label>起点 <input id="heatmapStart" type="datetime-local" /></label>
          <label>时长
            <select id="heatmapWindow">
              <option value="1">最近 1 小时</option>
              <option value="3">最近 3 小时</option>
              <option value="6" selected>最近 6 小时</option>
              <option value="12">最近 12 小时</option>
              <option value="24">最近 24 小时</option>
            </select>
          </label>
          <label>队伍数
            <select id="heatmapTeams">
              <option value="2">2 队 (5v5)</option>
              <option value="6">6 队</option>
              <option value="16" selected>16 队 (64 人)</option>
            </select>
          </label>
          <button type="submit">绘制</button>
        </form>
        <div class="heatmap-summary" id="heatmapSummary"></div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
        <div class="heatmap-legend" id="heatmapLegend"></div>
      </section>
      <section class="topology-panel" id="topologyPanel" aria-label="网络拓扑" hidden>
        <div class="topology-toolbar">
          <span class="topology-legend">
            <i class="dot good"></i> 在线
            <i class="dot warn"></i> 高延迟
            <i class="dot bad"></i> 离线
            <i class="dot none"></i> 无数据
          </span>
          <span class="topology-updated" id="topologyUpdated"></span>
        </div>
        <div class="topology-canvas" id="topologyCanvas"></div>
        <aside class="topology-detail" id="topologyDetail"></aside>
      </section>
      <section class="incident-panel" id="incidentPanel" aria-label="卡顿根因分析" hidden>
        <form class="incident-controls" id="incidentForm">
          <label>事发时间 <input id="incidentAt" type="datetime-local" /></label>
          <label>分析窗口
            <select id="incidentWindow">
              <option value="2">前后 2 分钟</option>
              <option value="5" selected>前后 5 分钟</option>
              <option value="10">前后 10 分钟</option>
              <option value="15">前后 15 分钟</option>
            </select>
          </label>
          <label>抖动阈值
            <select id="incidentThreshold">
              <option value="0.02">20 ms（推荐）</option>
              <option value="0.03">30 ms</option>
              <option value="0.05">50 ms</option>
              <option value="0.08">80 ms</option>
            </select>
          </label>
          <button type="submit">分析</button>
        </form>
        <div class="incident-verdict" id="incidentVerdict"></div>
        <section class="incident-grid">
          <article class="incident-card" aria-labelledby="incidentPlayersTitle">
            <h2 id="incidentPlayersTitle">受影响选手</h2>
            <div class="incident-card-body" id="incidentPlayers"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentInfraTitle">
            <h2 id="incidentInfraTitle">基础设施</h2>
            <div class="incident-card-body" id="incidentInfra"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentIspTitle">
            <h2 id="incidentIspTitle">ISP / WAN 流量</h2>
            <div class="incident-card-body" id="incidentIsp"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentStageTitle">
            <h2 id="incidentStageTitle">按 Stage 分组</h2>
            <div class="incident-card-body" id="incidentStage"></div>
          </article>
        </section>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./pages.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

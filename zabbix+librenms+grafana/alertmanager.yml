global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'component']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m
  receiver: 'feishu'
  routes:
    - matchers:
        - severity = critical
      receiver: 'feishu'
      group_wait: 5s
      repeat_interval: 15m

receivers:
  - name: 'feishu'
    webhook_configs:
      - url: 'http://alertmanager-feishu-bridge:5005/webhook'
        send_resolved: true
        max_alerts: 0

# 暂无 inhibit_rules — 当前只保留 MonitoringServerDown + ISPLinkSaturation 两条规则，
# 互相之间不存在层级关系。后续如果再加规则需要抑制下游告警，在这里追加：

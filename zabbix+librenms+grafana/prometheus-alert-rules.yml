# 这条链路（Prometheus → Alertmanager → 飞书）发给"同事群"，Zabbix 发给你自己。
# 这里要"全发"：所有基础设施掉线 + ISP 链路饱和。
#
# 注意：ISP 链路饱和的告警不在这里——它的阈值要按每条 ISP 的带宽走，由
# prometheus-gen-config.sh 从 BIGSCREEN_ISP_MAX_BANDWIDTH 动态生成到
# /tmp/prometheus-isp-rules.yml（容器启动时）。本文件只放静态的"掉线"类规则。
groups:
  - name: infra-down
    interval: 30s
    rules:
      - alert: ISPDown
        expr: probe_success{job="infra-isp-ping"} == 0
        for: 2m
        labels:
          severity: critical
          component: isp
        annotations:
          summary: "ISP 链路离线: {{ $labels.instance }}"
          description: "{{ $labels.instance }}（{{ $labels.target_ip }}）持续 2 分钟无 ICMP 响应"

      - alert: FirewallDown
        expr: probe_success{job="infra-fw-ping"} == 0
        for: 1m
        labels:
          severity: critical
          component: firewall
        annotations:
          summary: "防火墙离线: {{ $labels.instance }}"
          description: "{{ $labels.instance }}（{{ $labels.target_ip }}）持续 1 分钟无 ICMP 响应"

      - alert: CoreSwitchDown
        expr: probe_success{job="infra-core-ping"} == 0
        for: 1m
        labels:
          severity: critical
          component: core
        annotations:
          summary: "核心交换机离线: {{ $labels.instance }}"
          description: "{{ $labels.instance }}（{{ $labels.target_ip }}）持续 1 分钟无 ICMP 响应"

      - alert: AccessSwitchDown
        expr: probe_success{job="infra-dist-ping"} == 0
        for: 1m
        labels:
          severity: warning
          component: access
        annotations:
          summary: "接入交换机离线: {{ $labels.instance }}"
          description: "{{ $labels.instance }}（{{ $labels.target_ip }}）持续 1 分钟无 ICMP 响应"

      - alert: ServerDown
        expr: probe_success{job="infra-srv-ping"} == 0
        for: 1m
        labels:
          severity: critical
          component: server
        annotations:
          summary: "服务器离线: {{ $labels.instance }}"
          description: "{{ $labels.instance }}（{{ $labels.target_ip }}）持续 1 分钟无 ICMP 响应"

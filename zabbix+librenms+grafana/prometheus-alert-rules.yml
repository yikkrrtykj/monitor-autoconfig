groups:
  - name: tournament-prometheus-only
    interval: 30s
    rules:
      # Zabbix can't monitor itself going down. Prometheus + Alertmanager
      # have one last chance to push before the box dies.
      - alert: MonitoringServerDown
        expr: probe_success{job="infra-srv-ping"} == 0
        for: 1m
        labels:
          severity: critical
          component: server
        annotations:
          summary: "监控服务器自身离线"
          description: "{{ $labels.instance }} 持续 1 分钟无 ICMP 响应"

      # Zabbix templates collect interface traffic but don't ship a
      # utilization-threshold trigger. Default 800 Mbps = 80% of 1 Gbps.
      # Adjust the literal for non-1-Gbps links and recreate prometheus.
      - alert: ISPLinkSaturation
        expr: |
          sum by (ifAlias, instance) (
            rate(ifHCInOctets{job="firewall-snmp"}[1m])
            or rate(ifHCOutOctets{job="firewall-snmp"}[1m])
          ) * 8 > 800 * 1000 * 1000
        for: 2m
        labels:
          severity: warning
          component: isp
        annotations:
          summary: "ISP 链路接近饱和: {{ $labels.ifAlias }}"
          description: "{{ $labels.ifAlias }} 流量峰值持续超过 800 Mbps"

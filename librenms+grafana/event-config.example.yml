event:
  name:
  default_layout: tournament-64-2layer

networks:
  player_vlan: 40
  wireless_vlan: 41
  player_subnets: 192.168.40.0/24
  wireless_subnets: 192.168.41.0/24
  player_gateways:
  switch_management_ranges: 192.168.10.1-100,192.168.10.254
  firewall_management_ranges: 192.168.9.0/24

snmp:
  community: global

devices:
  core:
    ip:
  firewall:
    ip:
    name:
    snmp:
    unit_snmp:
  stage_switches: []
  access_switches: []
  servers: []

isp:
  auto_discovery: true
  wan_if_filter: telecom,telcom,unicom,isp,WAN
  max_bandwidth_mbps:
  links: []

unifi:
  enabled: false
  controller_url:
  user:
  password:
  sites: all
  verify_ssl: false

alerts:
  feishu_robot_token:
  feishu_app_id:
  feishu_app_secret:
  feishu_chat_id:
  # local=单套监控；hub=唯一飞书长连接中心；site=只发送本站告警，不建立长连接
  feishu_mode: local
  feishu_site_id:
  feishu_default_site_id:
  # hub 模式填写其它现场；本项目路由自动建立，群名自动解析，内部令牌自动生成。
  feishu_sites: []

security:
  grafana_anonymous: true

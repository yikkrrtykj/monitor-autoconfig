    volumes:
      - ./librenms-data:/data
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-}"
      LIBRENMS_FORCE_BASE_URL: "${LIBRENMS_FORCE_BASE_URL:-false}"
      APP_URL: "http://localhost:8002"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      DISPATCHER_NODE_ID: "${LIBRENMS_DISPATCHER_NODE_ID:-dispatcher1}"
      SIDECAR_DISPATCHER: 1
      PUID: 1000
      PGID: 1000
    networks:
      - monitor

  librenms-config:
    image: ${LIBRENMS_IMAGE:-librenms/librenms:latest}
    container_name: librenms-config
    depends_on:
      librenms:
        condition: service_started
      librenms-dispatcher:
        condition: service_started
    networks:
      - monitor
    restart: "no"
    volumes:
      - ./librenms-data:/data
      - ./librenms-auto-config.sh:/librenms-auto-config.sh:ro
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-}"
      LIBRENMS_FORCE_BASE_URL: "${LIBRENMS_FORCE_BASE_URL:-false}"
      APP_URL: "http://localhost:8002"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      LIBRENMS_SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-}"
      LIBRENMS_DISCOVERY_TARGETS: "${LIBRENMS_DISCOVERY_TARGETS:-192.168.10.1-100,192.168.10.254}"
      SNMP_TIMEOUT: "${SNMP_TIMEOUT:-1}"
      SNMP_RETRIES: "${SNMP_RETRIES:-0}"
      LIBRENMS_ADMIN_USER: "${LIBRENMS_ADMIN_USER:-admin}"
      LIBRENMS_ADMIN_PASSWORD: "${LIBRENMS_ADMIN_PASSWORD:-librenms123}"
      LIBRENMS_ADMIN_EMAIL: "${LIBRENMS_ADMIN_EMAIL:-admin@example.com}"
      LIBRENMS_OWN_HOSTNAME: "${SERVER_IP:-}"
      FIREWALL_DISCOVERY_RANGE: "${FIREWALL_DISCOVERY_RANGE:-}"
      FIREWALL_SNMP_COMMUNITY: "${FIREWALL_SNMP_COMMUNITY:-${SNMP_COMMUNITY:-public}}"
      FIREWALL_SNMP_TARGETS: "${FIREWALL_SNMP_TARGETS:-}"
      FEISHU_ROBOT_TOKEN: "${FEISHU_ROBOT_TOKEN:-}"
      ISP_PING: "${ISP_PING:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      ISP_SATURATION_PERCENT: "${ISP_SATURATION_PERCENT:-80}"
      FIREWALL_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
      UPLINK_IF_FILTER: "${UPLINK_IF_FILTER:-to-stage,to-core,to-dist,uplink}"
      LIBRENMS_IGNORE_DOWN_PORTS: "${LIBRENMS_IGNORE_DOWN_PORTS:-true}"
      LIBRENMS_SUPPRESS_STP_EVENTS: "${LIBRENMS_SUPPRESS_STP_EVENTS:-true}"
      LIBRENMS_UPTIME_WARNING_SECONDS: "${LIBRENMS_UPTIME_WARNING_SECONDS:-0}"
      LIBRENMS_HOME_DASHBOARD_AUTO: "${LIBRENMS_HOME_DASHBOARD_AUTO:-true}"
      LIBRENMS_HOME_DASHBOARD_NAME: "${LIBRENMS_HOME_DASHBOARD_NAME:-赛事网络总览}"
      LIBRENMS_HOME_WAN_CARDS: "${LIBRENMS_HOME_WAN_CARDS:-true}"
      LIBRENMS_HOME_WAN_CARD_LIMIT: "${LIBRENMS_HOME_WAN_CARD_LIMIT:-8}"
      LIBRENMS_HOME_TOP_INTERFACES: "${LIBRENMS_HOME_TOP_INTERFACES:-true}"
      LIBRENMS_HOME_TOP_DEVICES: "${LIBRENMS_HOME_TOP_DEVICES:-true}"
      LIBRENMS_HOME_SWITCH_CPU: "${LIBRENMS_HOME_SWITCH_CPU:-true}"
      LIBRENMS_HOME_SERVER_STATS: "${LIBRENMS_HOME_SERVER_STATS:-auto}"
      LIBRENMS_API_TOKEN: "${LIBRENMS_API_TOKEN:-}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for LibreNMS to fully initialize..."
        sleep 30
        echo "Running LibreNMS auto-configuration..."
        /bin/sh /librenms-auto-config.sh
        echo ""
        echo "UniFi APs: optional via unpoller/controller API; bridge can auto-add online APs to LibreNMS by SNMP"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.1.0}
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-root}"
      GF_SECURITY_ALLOW_EMBEDDING: "${GRAFANA_ALLOW_EMBEDDING:-true}"
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "${GRAFANA_ANONYMOUS_ORG_ROLE:-Viewer}"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_PROTOCOL: http
      GF_DEFAULT_LOCALE: zh-Hans
      GF_DEFAULT_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning-rendered:/etc/grafana/provisioning:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    networks:
      - monitor

  bigscreen:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: bigscreen
    restart: unless-stopped
    environment:
      BIGSCREEN_EVENT_NAME: "${EVENT_NAME:-}"
      BIGSCREEN_TITLE: "${BIGSCREEN_TITLE:-}"
      BIGSCREEN_SUBTITLE: "${BIGSCREEN_SUBTITLE:-}"
      BIGSCREEN_LOGO_TEXT: "${BIGSCREEN_LOGO_TEXT:-}"
      BIGSCREEN_EVENT_MODE: "${BIGSCREEN_EVENT_MODE:-rehearsal}"
      BIGSCREEN_DEFAULT_LAYOUT: "${BIGSCREEN_DEFAULT_LAYOUT:-tournament-64-2layer}"
      BIGSCREEN_SECURITY_MODE: "${BIGSCREEN_SECURITY_MODE:-internal}"
      BIGSCREEN_PUBLIC_BASE_URL: "${BIGSCREEN_PUBLIC_BASE_URL:-}"
      BIGSCREEN_GRAFANA_ANONYMOUS: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      BIGSCREEN_PROMETHEUS_BASE_URL: "${BIGSCREEN_PROMETHEUS_BASE_URL:-}"
      BIGSCREEN_ISP_NAMES: "${BIGSCREEN_ISP_NAMES:-}"
      BIGSCREEN_ISP_IPS: "${BIGSCREEN_ISP_IPS:-}"
      BIGSCREEN_ISP_AUTO_DISCOVER: "${BIGSCREEN_ISP_AUTO_DISCOVER:-true}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      ISP_PING: "${ISP_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      BIGSCREEN_STAGE_DEVICE_FILTER: "${BIGSCREEN_STAGE_DEVICE_FILTER:-stage,wutai,舞台}"
      BIGSCREEN_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
    volumes:
      - ./bigscreen:/app:ro
      - topology-data:/srv/topology:ro
    ports:
      - "${BIGSCREEN_PORT:-8088}:80"
    depends_on:
      prometheus:
        condition: service_healthy
      platform-api:
        condition: service_healthy
    networks:
      - monitor
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -r /app/. /usr/share/nginx/html/
        cat > /usr/share/nginx/html/config.js <<EOF
        window.BIGSCREEN_CONFIG = {
          eventName: "$${BIGSCREEN_EVENT_NAME:-}",
          title: "$${BIGSCREEN_TITLE:-}",
          subtitle: "$${BIGSCREEN_SUBTITLE:-}",
          logoText: "$${BIGSCREEN_LOGO_TEXT:-}",
          eventMode: "$${BIGSCREEN_EVENT_MODE:-rehearsal}",
          defaultLayout: "$${BIGSCREEN_DEFAULT_LAYOUT:-tournament-64-2layer}",
          securityMode: "$${BIGSCREEN_SECURITY_MODE:-internal}",
          publicBaseUrl: "$${BIGSCREEN_PUBLIC_BASE_URL:-}",
          grafanaAnonymous: "$${BIGSCREEN_GRAFANA_ANONYMOUS:-true}",
          prometheusBaseUrl: "$${BIGSCREEN_PROMETHEUS_BASE_URL:-}",
          ispNames: "$${BIGSCREEN_ISP_NAMES:-}",
          ispIps: "$${BIGSCREEN_ISP_IPS:-$${ISP_PING:-}}",
          ispAutoDiscovery: "$${BIGSCREEN_ISP_AUTO_DISCOVER:-true}",
          ispMaxBandwidthMbps: "$${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}",
          serverTargets: "$${SERVER_PING:-}",
          stageDeviceFilter: "$${BIGSCREEN_STAGE_DEVICE_FILTER:-stage,wutai,舞台}",
          wanIfFilter: "$${BIGSCREEN_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
        };
        EOF
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /app;
          add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          location = /config.js {
            alias /usr/share/nginx/html/config.js;
          }

          location / {
            try_files $$uri $$uri/ /index.html;
          }

          location /prometheus/ {
            # 用 Docker 内嵌 DNS（127.0.0.11）运行时解析 prometheus，避免其容器重建后
            # 换了 IP、而 nginx 仍缓存旧 IP 导致 502。写死主机名的 proxy_pass 只在 nginx
            # 启动时解析一次；用变量 + resolver 可强制每 30s 重新解析。
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $$prom_upstream prometheus;
            rewrite ^/prometheus/(.*)$$ /$$1 break;
            proxy_pass http://$$prom_upstream:9090;
          }

          location /topology/ {
            alias /srv/topology/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            try_files $$uri =404;
          }

          location /player-targets/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $$pt_upstream player-targets;
            rewrite ^/player-targets/(.*)$$ /$$1 break;
            proxy_pass http://$$pt_upstream:9199;
            proxy_read_timeout 5s;
          }

          location /platform-api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $$platform_upstream platform-api;
            rewrite ^/platform-api/(.*)$$ /$$1 break;
            proxy_pass http://$$platform_upstream:9200;
            proxy_read_timeout 30s;
          }
        }
        EOF
        exec nginx -g 'daemon off;'

  grafana-setup:
    image: ${GRAFANA_SETUP_IMAGE:-monitor-grafana-setup:local}
    build:
      context: ./docker/grafana-setup
    container_name: grafana-setup
    environment:
      GRAFANA_USER: "${GRAFANA_USER:-admin}"
      GRAFANA_PASSWORD: "${GRAFANA_PASSWORD:-root}"
    depends_on:
      grafana:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - monitor
    restart: on-failure
    volumes:
      - ./grafana-setup.sh:/grafana-setup.sh:ro
    command: ["/bin/sh", "-c", "sleep 30 && /bin/sh /grafana-setup.sh"]

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - monitor

  rsyslog:
    image: ${RSYSLOG_IMAGE:-monitor-rsyslog:local}
    build:
      context: ./docker/rsyslog
    container_name: rsyslog
    restart: unless-stopped
    command: ["rsyslogd", "-n", "-f", "/etc/rsyslog.conf"]
    volumes:
      - ./rsyslog.conf:/etc/rsyslog.conf:ro
      - syslog-spool:/var/log/remote
    ports:
      - "${SYSLOG_PORT:-514}:514/udp"
      - "${SYSLOG_PORT:-514}:514/tcp"
    networks:
      - monitor

  promtail-syslog:
    image: grafana/promtail:2.9.8
    container_name: promtail-syslog
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - syslog-spool:/var/log/remote:ro
      - promtail-data:/promtail
    depends_on:
      - loki
      - rsyslog
    networks:
      - monitor

networks:
  monitor:
    driver: bridge

volumes:
  loki-data:
  syslog-spool:
  promtail-data:
  prometheus-data:
  bridge-state:
  player-targets-data:
  topology-data:
  grafana-data:
  librenms-db-data:
  platform-state:
  librenms-data:

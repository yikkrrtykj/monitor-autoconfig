name: librenms-grafana

services:
  librenms-db:
    image: ${MARIADB_IMAGE:-mariadb:10.5}
    container_name: librenms-db
    restart: unless-stopped
    command:
      - "mysqld"
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: librenms_root
      MYSQL_DATABASE: librenms
      MYSQL_USER: librenms
      MYSQL_PASSWORD: librenms
    volumes:
      - ./librenms-db-data:/var/lib/mysql
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plibrenms_root"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  librenms-redis:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: librenms-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  librenms-rrdcached:
    image: ${RRDCACHED_IMAGE:-crazymax/rrdcached:latest}
    container_name: librenms-rrdcached
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PUID: 1000
      PGID: 1000
      WRITE_TIMEOUT: 300
      WRITE_JITTER: 180
      WRITE_THREADS: 4
    volumes:
      - ./librenms-data/rrd:/data/db
      - ./librenms-rrdcached-journal:/data/journal
    networks:
      - monitor

  init-permissions:
    image: ${ALPINE_IMAGE:-alpine:3.20}
    container_name: init-permissions
    volumes:
      - ./grafana-data:/grafana-data
      - ./prometheus-data:/prometheus-data
      - ./librenms-db-data:/librenms-db-data
      - ./librenms-data:/librenms-data
      - ./librenms-rrdcached-journal:/librenms-rrdcached-journal
    command: |
      sh -c '
        echo "Setting up directory permissions..."
        mkdir -p /grafana-data /prometheus-data /librenms-db-data /librenms-data /librenms-data/rrd /librenms-rrdcached-journal
        chown -R 999:999 /librenms-db-data
        chown -R 472:472 /grafana-data
        chown -R 65534:65534 /prometheus-data
        chown -R 1000:1000 /librenms-data /librenms-rrdcached-journal
        chmod -R 755 /grafana-data /prometheus-data /librenms-db-data /librenms-data
        chmod -R 775 /librenms-data/rrd /librenms-rrdcached-journal
        echo "Permissions set successfully"
      '
    networks:
      - monitor
    restart: "no"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.53.1}
    container_name: prometheus
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      DIST_SWITCH_PING: "${DIST_SWITCH_PING:-}"
      INTERCONNECT_SNMP_TARGETS: "${INTERCONNECT_SNMP_TARGETS:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      ISP_PING: "${ISP_PING:-}"
      BIGSCREEN_ISP_IPS: "${BIGSCREEN_ISP_IPS:-}"
      FIREWALL_SNMP_TARGETS: "${FIREWALL_SNMP_TARGETS:-}"
      FIREWALL_UNIT_SNMP_TARGETS: "${FIREWALL_UNIT_SNMP_TARGETS:-}"
      SNMP_AUTH: "${SNMP_AUTH:-global}"
      PROMETHEUS_SCRAPE_INTERVAL: "${PROMETHEUS_SCRAPE_INTERVAL:-10s}"
      PLAYER_PING_SCRAPE_INTERVAL: "${PLAYER_PING_SCRAPE_INTERVAL:-5s}"
      INFRA_PING_SCRAPE_INTERVAL: "${INFRA_PING_SCRAPE_INTERVAL:-2s}"
      ISP_PING_SCRAPE_INTERVAL: "${ISP_PING_SCRAPE_INTERVAL:-1s}"
      PROMETHEUS_RETENTION_TIME: "${PROMETHEUS_RETENTION_TIME:-15d}"
      SNMP_UPTIME_SCRAPE_INTERVAL: "${SNMP_UPTIME_SCRAPE_INTERVAL:-600s}"
      SWITCH_IFMIB_SCRAPE_INTERVAL: "${SWITCH_IFMIB_SCRAPE_INTERVAL:-10s}"
      UNIFI_CONTROLLER_URL: "${UNIFI_CONTROLLER_URL:-}"
      UNIFI_SCRAPE_INTERVAL: "${UNIFI_SCRAPE_INTERVAL:-10s}"
      PLAYER_TARGETS_FILE: "/etc/prometheus/targets/player_targets.json"
    volumes:
      - prometheus-data:/prometheus
      - player-targets-data:/etc/prometheus/targets
      - topology-data:/etc/prometheus/targets/topology
      - ./prometheus-gen-config.sh:/etc/prometheus/prometheus-gen-config.sh:ro
      - /etc/localtime:/etc/localtime:ro
    entrypoint:
      - /bin/sh
      - /etc/prometheus/prometheus-gen-config.sh
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  alertmanager-feishu-bridge:
    image: ${PYTHON_SLIM_IMAGE:-python:3.12-slim}
    container_name: alertmanager-feishu-bridge
    restart: unless-stopped
    volumes:
      - ./alertmanager-feishu-bridge.py:/app/bridge.py:ro
      - /etc/localtime:/etc/localtime:ro
      - ./librenms-data:/librenms-data:ro
      - bridge-state:/bridge-state
      - syslog-spool:/var/log/remote:ro
    environment:
      TZ: Asia/Shanghai
      FEISHU_BRIDGE_PORT: "5005"
      FEISHU_ROBOT_TOKEN: "${FEISHU_ROBOT_TOKEN:-}"
      FEISHU_BRIDGE_DRY_RUN: "${FEISHU_BRIDGE_DRY_RUN:-false}"
      FEISHU_BRIDGE_EVENT_ID_START: "${FEISHU_BRIDGE_EVENT_ID_START:-0}"
      FEISHU_BRIDGE_STATE_DIR: "${FEISHU_BRIDGE_STATE_DIR:-/bridge-state}"
      LIBRENMS_URL: "http://librenms:8000"
      LIBRENMS_API_TOKEN: "${LIBRENMS_API_TOKEN:-}"
      SWITCH_WATCH_INTERVAL: "${SWITCH_WATCH_INTERVAL:-30}"
      PROMETHEUS_URL: "http://prometheus:9090"
      ISP_ALERT_ENABLED: "${ISP_ALERT_ENABLED:-true}"
      ISP_ALERT_FOR_SECONDS: "${ISP_ALERT_FOR_SECONDS:-10}"
      ISP_ALERT_POLL_INTERVAL: "${ISP_ALERT_POLL_INTERVAL:-5}"
      ISP_ALERT_RATE_WINDOW: "${ISP_ALERT_RATE_WINDOW:-1m}"
      ISP_ALERT_RESOLVE_SECONDS: "${ISP_ALERT_RESOLVE_SECONDS:-30}"
      ISP_ALERT_STATUS_INTERVAL: "${ISP_ALERT_STATUS_INTERVAL:-30}"
      DEVICE_DOWN_ENABLED: "${DEVICE_DOWN_ENABLED:-true}"
      DEVICE_DOWN_FOR_SECONDS: "${DEVICE_DOWN_FOR_SECONDS:-10}"
      ISP_DOWN_FOR_SECONDS: "${ISP_DOWN_FOR_SECONDS:-0}"
      DEVICE_DOWN_REQUIRE_SEEN_UP: "${DEVICE_DOWN_REQUIRE_SEEN_UP:-true}"
      DEVICE_DOWN_POLL_INTERVAL: "${DEVICE_DOWN_POLL_INTERVAL:-1}"
      DEVICE_DOWN_SAMPLE_WINDOW_SECONDS: "${DEVICE_DOWN_SAMPLE_WINDOW_SECONDS:-5}"
      DEVICE_DOWN_JOBS: "${DEVICE_DOWN_JOBS:-infra-core-ping,infra-dist-ping,infra-fw-ping,infra-isp-ping,infra-srv-ping}"
      DEVICE_ONLINE_FROM_PING: "${DEVICE_ONLINE_FROM_PING:-false}"
      DEVICE_AUTO_ADD_FROM_PING: "${DEVICE_AUTO_ADD_FROM_PING:-true}"
      DEVICE_AUTO_ADD_SNMP_JOBS: "${DEVICE_AUTO_ADD_SNMP_JOBS:-infra-core-ping,infra-dist-ping}"
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-public}"
      INTERCONNECT_ALERT_ENABLED: "${INTERCONNECT_ALERT_ENABLED:-true}"
      INTERCONNECT_ALERT_FOR_SECONDS: "${INTERCONNECT_ALERT_FOR_SECONDS:-5}"
      INTERCONNECT_ALERT_POLL_INTERVAL: "${INTERCONNECT_ALERT_POLL_INTERVAL:-5}"
      INTERCONNECT_ALERT_JOBS: "${INTERCONNECT_ALERT_JOBS:-infra-switch-ifmib}"
      INTERCONNECT_PORT_FILTER: "${INTERCONNECT_PORT_FILTER:-port-channel,portchannel,po,eth-trunk,bridge-aggregation,bundle-ether,lag,ae,be,trk}"
      UNIFI_AP_ALERT_ENABLED: "${UNIFI_AP_ALERT_ENABLED:-true}"
      UNIFI_AP_DOWN_FOR_SECONDS: "${UNIFI_AP_DOWN_FOR_SECONDS:-180}"
      UNIFI_AP_POLL_INTERVAL: "${UNIFI_AP_POLL_INTERVAL:-5}"
      UNIFI_AP_SNMP_AUTO_ADD: "${UNIFI_AP_SNMP_AUTO_ADD:-true}"
      UNIFI_AP_SNMP_COMMUNITY: "${UNIFI_AP_SNMP_COMMUNITY:-${SNMP_COMMUNITY:-public}}"
      UNIFI_AP_SNMP_ADD_RETRY_SECONDS: "${UNIFI_AP_SNMP_ADD_RETRY_SECONDS:-60}"
      UNIFI_CONTROLLER_URL: "${UNIFI_CONTROLLER_URL:-}"
      UNIFI_CONTROLLER_USER: "${UNIFI_CONTROLLER_USER:-}"
      UNIFI_CONTROLLER_PASS: "${UNIFI_CONTROLLER_PASS:-}"
      UNIFI_CONTROLLER_SITES: "${UNIFI_CONTROLLER_SITES:-all}"
      UNIFI_CONTROLLER_VERIFY_SSL: "${UNIFI_CONTROLLER_VERIFY_SSL:-false}"
      UNIFI_CONTROLLER_REFRESH_SECONDS: "${UNIFI_CONTROLLER_REFRESH_SECONDS:-10}"
      UNIFI_AP_NAME_SYNC_SECONDS: "${UNIFI_AP_NAME_SYNC_SECONDS:-300}"
      FIREWALL_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      BIGSCREEN_ISP_IPS: "${BIGSCREEN_ISP_IPS:-}"
      ISP_PING: "${ISP_PING:-}"
      ISP_SATURATION_PERCENT: "${ISP_SATURATION_PERCENT:-80}"
      SYSLOG_WATCH_ENABLED: "${SYSLOG_WATCH_ENABLED:-true}"
      SYSLOG_EVENT_RATE_LIMIT: "${SYSLOG_EVENT_RATE_LIMIT:-60}"
      SYSLOG_ALERT_TYPES: "${SYSLOG_ALERT_TYPES:-native_vlan_mismatch,errdisable,loopback,dhcp_snooping}"
      SYSLOG_CORRELATION_SECONDS: "${SYSLOG_CORRELATION_SECONDS:-10}"
      SYSLOG_RECOVERY_ENABLED: "${SYSLOG_RECOVERY_ENABLED:-true}"
      SYSLOG_FILE: "/var/log/remote/syslog.log"
    command: ["python", "/app/bridge.py"]
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5005/health', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  snmp-exporter:
    image: ${SNMP_EXPORTER_IMAGE:-prom/snmp-exporter:v0.26.0}
    container_name: snmp-exporter
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/snmp-auth.yml <<EOF
        auths:
          $${SNMP_AUTH:-global}:
            community: "$${SNMP_COMMUNITY:-global}"
            security_level: noAuthNoPriv
            auth_protocol: MD5
            priv_protocol: DES
            version: 2
        EOF
        cat > /tmp/snmp-system.yml <<'EOF'
        modules:
          system_uptime:
            get:
              - 1.3.6.1.2.1.1.3.0
              - 1.3.6.1.2.1.1.5.0
            max_repetitions: 25
            retries: 3
            timeout: 10s
            metrics:
              - name: sysUpTime
                oid: 1.3.6.1.2.1.1.3
                type: gauge
                help: The time in hundredths of a second since the network management portion of the system was last re-initialized.
              - name: sysName
                oid: 1.3.6.1.2.1.1.5
                type: DisplayString
                help: The administratively-assigned name for this managed node.
        EOF
        exec /bin/snmp_exporter \
          --config.file=/etc/snmp_exporter/snmp.yml \
          --config.file=/tmp/snmp-system.yml \
          --config.file=/tmp/snmp-auth.yml
    environment:
      SNMP_AUTH: "${SNMP_AUTH:-global}"
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
    ports:
      - "${SNMP_EXPORTER_BIND:-127.0.0.1}:${SNMP_EXPORTER_PORT:-9116}:9116"
    networks:
      - monitor

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:v0.25.0}
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "${BLACKBOX_EXPORTER_BIND:-127.0.0.1}:${BLACKBOX_EXPORTER_PORT:-9115}:9115"
    networks:
      - monitor
    environment:
      BLACKBOX_ICMP_TIMEOUT: "${BLACKBOX_ICMP_TIMEOUT:-1s}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /etc/blackbox_exporter/config.yml << EOF
        modules:
          icmp:
            prober: icmp
            timeout: $${BLACKBOX_ICMP_TIMEOUT:-1s}
            icmp:
              preferred_ip_protocol: ip4
          http_2xx:
            prober: http
            timeout: 5s
            http:
              valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
              valid_status_codes: []
              method: GET
              preferred_ip_protocol: ip4
        EOF
        exec /bin/blackbox_exporter --config.file=/etc/blackbox_exporter/config.yml

  # UniFi Poller(unpoller)：从 UniFi 控制器 API 拉每台 AP/客户端/站点指标，吐成
  # Prometheus metrics。这里不依赖 AP 自身 SNMP，适合 AP 多网段、统一控制器管理的场景。
  # 放在 "unifi" profile 里；.env.example 默认开启，因为赛事现场通常都有 UniFi。
  # 如果某场完全不用 UniFi，把 COMPOSE_PROFILES 留空即可不启动。
  unpoller:
    image: ${UNPOLLER_IMAGE:-ghcr.io/unpoller/unpoller:v2.15.3}
    container_name: unpoller
    restart: unless-stopped
    profiles: ["unifi"]
    environment:
      TZ: Asia/Shanghai
      UP_UNIFI_DEFAULT_URL: "${UNIFI_CONTROLLER_URL:-}"
      UP_UNIFI_DEFAULT_USER: "${UNIFI_CONTROLLER_USER:-}"
      UP_UNIFI_DEFAULT_PASS: "${UNIFI_CONTROLLER_PASS:-}"
      UP_UNIFI_DEFAULT_SITES: "${UNIFI_CONTROLLER_SITES:-all}"
      UP_UNIFI_DEFAULT_VERIFY_SSL: "${UNIFI_CONTROLLER_VERIFY_SSL:-false}"
      UP_UNIFI_DEFAULT_SAVE_SITES: "true"
      UP_UNIFI_DEFAULT_SAVE_DPI: "${UNIFI_SAVE_DPI:-false}"
      UP_POLLER_DEBUG: "${UNPOLLER_DEBUG:-false}"
      UP_PROMETHEUS_DISABLE: "false"
      UP_PROMETHEUS_HTTP_LISTEN: "0.0.0.0:9130"
      UP_INFLUXDB_DISABLE: "true"
    ports:
      - "${UNPOLLER_BIND:-127.0.0.1}:${UNPOLLER_PORT:-9130}:9130"
    networks:
      - monitor

  player-targets:
    image: ${PLAYER_TOOLS_IMAGE:-monitor-player-tools:local}
    build:
      context: ./docker/player-tools
    container_name: player-targets
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    volumes:
      - player-targets-data:/targets
      - ./generate-player-targets.py:/generate-player-targets.py:ro
      - ./rescan-server.py:/rescan-server.py:ro
      - ./.env:/config/.env:ro
    environment:
      TZ: Asia/Shanghai
      TOURNAMENT_SWITCHES: "${TOURNAMENT_SWITCHES:-}"
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      PLAYER_GATEWAYS: "${PLAYER_GATEWAYS:-}"
      PLAYER_GATEWAY_SNMP_COMMUNITY: "${PLAYER_GATEWAY_SNMP_COMMUNITY:-}"
      PLAYER_VLAN_IDS: "${PLAYER_VLAN_IDS:-}"
      PLAYER_REQUIRE_LINK_UP: "${PLAYER_REQUIRE_LINK_UP:-true}"
      PLAYER_VERIFY_PING: "${PLAYER_VERIFY_PING:-true}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-}"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      PLAYER_SUBNETS: "${PLAYER_SUBNETS:-}"
      WIRELESS_SUBNETS: "${WIRELESS_SUBNETS:-}"
      PLAYER_STATIC_TARGETS: "${PLAYER_STATIC_TARGETS:-}"
      PLAYER_STATIC_NETWORK: "${PLAYER_STATIC_NETWORK:-wireless}"
      PLAYER_WIRELESS_SCAN: "${PLAYER_WIRELESS_SCAN:-true}"
      PLAYER_WIRELESS_SCAN_LIMIT: "${PLAYER_WIRELESS_SCAN_LIMIT:-0}"
      PLAYER_WIRELESS_SCAN_TEAM_SIZE: "${PLAYER_WIRELESS_SCAN_TEAM_SIZE:-5}"
      PLAYER_WIRELESS_SCAN_TIMEOUT: "${PLAYER_WIRELESS_SCAN_TIMEOUT:-1}"
      PLAYER_WIRELESS_SCAN_WORKERS: "${PLAYER_WIRELESS_SCAN_WORKERS:-64}"
      PLAYER_WIRELESS_SCAN_MAX_HOSTS: "${PLAYER_WIRELESS_SCAN_MAX_HOSTS:-512}"
      PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS: "${PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS:-true}"
      PLAYER_WIRELESS_SCAN_EXCLUDE: "${PLAYER_WIRELESS_SCAN_EXCLUDE:-}"
      PLAYER_TARGETS_REFRESH_INTERVAL: "${PLAYER_TARGETS_REFRESH_INTERVAL:-300}"
      PLAYER_TARGETS_FILE: "/targets/player_targets.json"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[player-targets] starting target generator loop"

        # Start rescan trigger API in background (POST /rescan → immediate re-scan)
        python3 /rescan-server.py &

        load_env_key() {
          key="$$1"
          [ -f /config/.env ] || return 0
          line="$$(grep -E "^[[:space:]]*$${key}[[:space:]]*=" /config/.env | tail -n 1 || true)"
          [ -n "$$line" ] || return 0
          value="$$(printf '%s' "$$line" | sed -E "s/^[[:space:]]*$${key}[[:space:]]*=[[:space:]]*//; s/[[:space:]]+#.*$$//; s/[[:space:]]*\r?$$//")"
          export "$$key=$$value"
        }

        load_runtime_env() {
          for key in TOURNAMENT_SWITCHES SNMP_COMMUNITY PLAYER_GATEWAYS PLAYER_GATEWAY_SNMP_COMMUNITY PLAYER_VLAN_IDS PLAYER_REQUIRE_LINK_UP PLAYER_VERIFY_PING LIBRENMS_CORE_IP CORE_SWITCH_PING PLAYER_SUBNETS WIRELESS_SUBNETS PLAYER_STATIC_TARGETS PLAYER_STATIC_NETWORK PLAYER_WIRELESS_SCAN PLAYER_WIRELESS_SCAN_LIMIT PLAYER_WIRELESS_SCAN_TEAM_SIZE PLAYER_WIRELESS_SCAN_TIMEOUT PLAYER_WIRELESS_SCAN_WORKERS PLAYER_WIRELESS_SCAN_MAX_HOSTS PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS PLAYER_WIRELESS_SCAN_EXCLUDE PLAYER_TARGETS_REFRESH_INTERVAL; do
            load_env_key "$$key"
          done
        }

        wait_or_trigger() {
          interval="$${PLAYER_TARGETS_REFRESH_INTERVAL:-300}"
          elapsed=0
          while [ "$$elapsed" -lt "$$interval" ]; do
            sleep 1
            elapsed=$$((elapsed + 1))
            if [ -f /targets/rescan.trigger ]; then
              rm -f /targets/rescan.trigger
              echo "[player-targets] manual rescan triggered"
              return
            fi
          done
        }

        while true; do
          load_runtime_env
          echo "[player-targets] using TOURNAMENT_SWITCHES=$${TOURNAMENT_SWITCHES:-} PLAYER_GATEWAYS=$${PLAYER_GATEWAYS:-$${LIBRENMS_CORE_IP:-}} PLAYER_VLAN_IDS=$${PLAYER_VLAN_IDS:-} PLAYER_SUBNETS=$${PLAYER_SUBNETS:-} WIRELESS_SUBNETS=$${WIRELESS_SUBNETS:-} PLAYER_WIRELESS_SCAN=$${PLAYER_WIRELESS_SCAN:-true}"
          python3 /generate-player-targets.py 2>&1 | while IFS= read -r line; do
            echo "[player-targets] $$line"
          done
          wait_or_trigger
        done

  topology-collector:
    image: ${PLAYER_TOOLS_IMAGE:-monitor-player-tools:local}
    build:
      context: ./docker/player-tools
    container_name: topology-collector
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    volumes:
      - topology-data:/targets
      - ./generate-topology-edges.py:/generate-topology-edges.py:ro
      - ./.env:/config/.env:ro
    environment:
      TZ: Asia/Shanghai
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      TOPOLOGY_DEVICES: "${TOPOLOGY_DEVICES:-}"
      TOPOLOGY_SNMP_COMMUNITY: "${TOPOLOGY_SNMP_COMMUNITY:-}"
      TOPOLOGY_OUTPUT_DIR: "/targets"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      DIST_SWITCH_PING: "${DIST_SWITCH_PING:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      TOURNAMENT_SWITCHES: "${TOURNAMENT_SWITCHES:-}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "[topology] starting LLDP collector loop"

        load_env_key() {
          key="$$1"
          [ -f /config/.env ] || return 0
          line="$$(grep -E "^[[:space:]]*$${key}[[:space:]]*=" /config/.env | tail -n 1 || true)"
          [ -n "$$line" ] || return 0
          value="$$(printf '%s' "$$line" | sed -E "s/^[[:space:]]*$${key}[[:space:]]*=[[:space:]]*//; s/[[:space:]]+#.*$$//; s/[[:space:]]*\r?$$//")"
          export "$$key=$$value"
        }

        load_runtime_env() {
          for key in SNMP_COMMUNITY TOPOLOGY_DEVICES TOPOLOGY_SNMP_COMMUNITY CORE_SWITCH_PING DIST_SWITCH_PING FIREWALL_PING TOURNAMENT_SWITCHES TOPOLOGY_REFRESH_INTERVAL; do
            load_env_key "$$key"
          done
        }

        while true; do
          load_runtime_env
          python3 /generate-topology-edges.py 2>&1 | while IFS= read -r line; do
            echo "[topology] $$line"
          done
          sleep "$${TOPOLOGY_REFRESH_INTERVAL:-600}"
        done

  platform-api:
    image: ${PYTHON_SLIM_IMAGE:-python:3.12-slim}
    container_name: platform-api
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - platform-state:/workspace/platform-state
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Asia/Shanghai
      PLATFORM_API_PORT: "9200"
      PLATFORM_WORKDIR: "/workspace"
      PLATFORM_STATE_DIR: "/workspace/platform-state"
      PLATFORM_WRITE_ENABLED: "${PLATFORM_WRITE_ENABLED:-true}"
    command: ["python", "/workspace/platform-api.py"]
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9200/health', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  librenms:
    image: ${LIBRENMS_IMAGE:-librenms/librenms:latest}
    container_name: librenms
    restart: unless-stopped
    hostname: librenms
    depends_on:
      librenms-db:
        condition: service_healthy
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      FONTCONFIG_PATH: /etc/fonts
      FONTCONFIG_FILE: /etc/fonts/fonts.conf
      XDG_CACHE_HOME: /tmp
      DB_HOST: librenms-db

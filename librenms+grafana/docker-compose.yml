name: librenms-grafana

services:
  librenms-db:
    image: mariadb:10.5
    container_name: librenms-db
    restart: unless-stopped
    command:
      - "mysqld"
      - "--innodb-file-per-table=1"
      - "--lower-case-table-names=0"
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: librenms_root
      MYSQL_DATABASE: librenms
      MYSQL_USER: librenms
      MYSQL_PASSWORD: librenms
    volumes:
      - ./librenms-db-data:/var/lib/mysql
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plibrenms_root"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  librenms-redis:
    image: redis:7.2-alpine
    container_name: librenms-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  librenms-rrdcached:
    image: crazymax/rrdcached:latest
    container_name: librenms-rrdcached
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PUID: 1000
      PGID: 1000
      WRITE_TIMEOUT: 300
      WRITE_JITTER: 180
      WRITE_THREADS: 4
    volumes:
      - ./librenms-data/rrd:/data/db
      - ./librenms-rrdcached-journal:/data/journal
    networks:
      - monitor

  init-permissions:
    image: alpine:latest
    container_name: init-permissions
    volumes:
      - ./grafana-data:/grafana-data
      - ./prometheus-data:/prometheus-data
      - ./librenms-db-data:/librenms-db-data
      - ./librenms-data:/librenms-data
      - ./librenms-rrdcached-journal:/librenms-rrdcached-journal
    command: |
      sh -c '
        echo "Setting up directory permissions..."
        mkdir -p /grafana-data /prometheus-data /librenms-db-data /librenms-data /librenms-data/rrd /librenms-rrdcached-journal
        chown -R 999:999 /librenms-db-data
        chown -R 472:472 /grafana-data
        chown -R 65534:65534 /prometheus-data
        chown -R 1000:1000 /librenms-data /librenms-rrdcached-journal
        chmod -R 755 /grafana-data /prometheus-data /librenms-db-data /librenms-data
        chmod -R 775 /librenms-data/rrd /librenms-rrdcached-journal
        echo "Permissions set successfully"
      '
    networks:
      - monitor
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      DIST_SWITCH_PING: "${DIST_SWITCH_PING:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      ISP_PING: "${ISP_PING:-}"
      BIGSCREEN_ISP_IPS: "${BIGSCREEN_ISP_IPS:-}"
      FIREWALL_SNMP_TARGETS: "${FIREWALL_SNMP_TARGETS:-}"
      SNMP_AUTH: "${SNMP_AUTH:-global}"
      PROMETHEUS_SCRAPE_INTERVAL: "${PROMETHEUS_SCRAPE_INTERVAL:-10s}"
      PLAYER_PING_SCRAPE_INTERVAL: "${PLAYER_PING_SCRAPE_INTERVAL:-5s}"
      PROMETHEUS_RETENTION_TIME: "${PROMETHEUS_RETENTION_TIME:-15d}"
      SNMP_UPTIME_SCRAPE_INTERVAL: "${SNMP_UPTIME_SCRAPE_INTERVAL:-600s}"
      PLAYER_TARGETS_FILE: "/etc/prometheus/targets/player_targets.json"
    volumes:
      - prometheus-data:/prometheus
      - player-targets-data:/etc/prometheus/targets
      - topology-data:/etc/prometheus/targets/topology
      - ./prometheus-gen-config.sh:/etc/prometheus/prometheus-gen-config.sh:ro
      - /etc/localtime:/etc/localtime:ro
    entrypoint:
      - /bin/sh
      - /etc/prometheus/prometheus-gen-config.sh
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  alertmanager-feishu-bridge:
    image: python:3.12-slim
    container_name: alertmanager-feishu-bridge
    restart: unless-stopped
    volumes:
      - ./alertmanager-feishu-bridge.py:/app/bridge.py:ro
      - /etc/localtime:/etc/localtime:ro
      - ./librenms-data:/librenms-data:ro
    environment:
      TZ: Asia/Shanghai
      FEISHU_BRIDGE_PORT: "5005"
      FEISHU_ROBOT_TOKEN: "${FEISHU_ROBOT_TOKEN:-}"
      FEISHU_BRIDGE_DRY_RUN: "${FEISHU_BRIDGE_DRY_RUN:-false}"
      LIBRENMS_URL: "http://librenms:8000"
      LIBRENMS_API_TOKEN: "${LIBRENMS_API_TOKEN:-}"
      SWITCH_WATCH_INTERVAL: "${SWITCH_WATCH_INTERVAL:-30}"
      PROMETHEUS_URL: "http://prometheus:9090"
      FIREWALL_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      ISP_SATURATION_PERCENT: "${ISP_SATURATION_PERCENT:-80}"
      ISP_BANDWIDTH_WATCH_INTERVAL: "${ISP_BANDWIDTH_WATCH_INTERVAL:-15}"
      ISP_BANDWIDTH_ALERT_FOR_SECONDS: "${ISP_BANDWIDTH_ALERT_FOR_SECONDS:-30}"
      ISP_BANDWIDTH_RECOVERY_SECONDS: "${ISP_BANDWIDTH_RECOVERY_SECONDS:-60}"
    command: ["python", "/app/bridge.py"]
    networks:
      - monitor
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5005/health', timeout=2)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /tmp/snmp-auth.yml <<EOF
        auths:
          $${SNMP_AUTH:-global}:
            community: "$${SNMP_COMMUNITY:-global}"
            security_level: noAuthNoPriv
            auth_protocol: MD5
            priv_protocol: DES
            version: 2
        EOF
        cat > /tmp/snmp-system.yml <<'EOF'
        modules:
          system_uptime:
            get:
              - 1.3.6.1.2.1.1.3.0
            max_repetitions: 25
            retries: 3
            timeout: 10s
            metrics:
              - name: sysUpTime
                oid: 1.3.6.1.2.1.1.3
                type: gauge
                help: The time in hundredths of a second since the network management portion of the system was last re-initialized.
        EOF
        exec /bin/snmp_exporter \
          --config.file=/etc/snmp_exporter/snmp.yml \
          --config.file=/tmp/snmp-system.yml \
          --config.file=/tmp/snmp-auth.yml
    environment:
      SNMP_AUTH: "${SNMP_AUTH:-global}"
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
    ports:
      - "${SNMP_EXPORTER_BIND:-127.0.0.1}:${SNMP_EXPORTER_PORT:-9116}:9116"
    networks:
      - monitor

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
      - "${BLACKBOX_EXPORTER_BIND:-127.0.0.1}:${BLACKBOX_EXPORTER_PORT:-9115}:9115"
    networks:
      - monitor
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /etc/blackbox_exporter/config.yml << 'EOF'
        modules:
          icmp:
            prober: icmp
            timeout: 5s
            icmp:
              preferred_ip_protocol: ip4
          http_2xx:
            prober: http
            timeout: 5s
            http:
              valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
              valid_status_codes: []
              method: GET
              preferred_ip_protocol: ip4
        EOF
        exec /bin/blackbox_exporter --config.file=/etc/blackbox_exporter/config.yml

  player-targets:
    image: python:3-alpine
    container_name: player-targets
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    volumes:
      - player-targets-data:/targets
      - ./generate-player-targets.py:/generate-player-targets.py:ro
      - ./rescan-server.py:/rescan-server.py:ro
      - ./.env:/config/.env:ro
    environment:
      TZ: Asia/Shanghai
      TOURNAMENT_SWITCHES: "${TOURNAMENT_SWITCHES:-}"
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      PLAYER_GATEWAYS: "${PLAYER_GATEWAYS:-}"
      PLAYER_GATEWAY_SNMP_COMMUNITY: "${PLAYER_GATEWAY_SNMP_COMMUNITY:-}"
      PLAYER_VLAN_IDS: "${PLAYER_VLAN_IDS:-}"
      PLAYER_REQUIRE_LINK_UP: "${PLAYER_REQUIRE_LINK_UP:-true}"
      PLAYER_VERIFY_PING: "${PLAYER_VERIFY_PING:-true}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-}"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      PLAYER_SUBNETS: "${PLAYER_SUBNETS:-}"
      WIRELESS_SUBNETS: "${WIRELESS_SUBNETS:-}"
      PLAYER_STATIC_TARGETS: "${PLAYER_STATIC_TARGETS:-}"
      PLAYER_STATIC_NETWORK: "${PLAYER_STATIC_NETWORK:-wireless}"
      PLAYER_WIRELESS_SCAN: "${PLAYER_WIRELESS_SCAN:-true}"
      PLAYER_WIRELESS_SCAN_LIMIT: "${PLAYER_WIRELESS_SCAN_LIMIT:-0}"
      PLAYER_WIRELESS_SCAN_TEAM_SIZE: "${PLAYER_WIRELESS_SCAN_TEAM_SIZE:-5}"
      PLAYER_WIRELESS_SCAN_TIMEOUT: "${PLAYER_WIRELESS_SCAN_TIMEOUT:-1}"
      PLAYER_WIRELESS_SCAN_WORKERS: "${PLAYER_WIRELESS_SCAN_WORKERS:-64}"
      PLAYER_WIRELESS_SCAN_MAX_HOSTS: "${PLAYER_WIRELESS_SCAN_MAX_HOSTS:-512}"
      PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS: "${PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS:-true}"
      PLAYER_WIRELESS_SCAN_EXCLUDE: "${PLAYER_WIRELESS_SCAN_EXCLUDE:-}"
      PLAYER_TARGETS_REFRESH_INTERVAL: "${PLAYER_TARGETS_REFRESH_INTERVAL:-300}"
      PLAYER_TARGETS_FILE: "/targets/player_targets.json"
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache net-snmp-tools
        echo "[player-targets] starting target generator loop"

        # Start rescan trigger API in background (POST /rescan → immediate re-scan)
        python3 /rescan-server.py &

        load_env_key() {
          key="$$1"
          [ -f /config/.env ] || return 0
          line="$$(grep -E "^[[:space:]]*$${key}[[:space:]]*=" /config/.env | tail -n 1 || true)"
          [ -n "$$line" ] || return 0
          value="$$(printf '%s' "$$line" | sed -E "s/^[[:space:]]*$${key}[[:space:]]*=[[:space:]]*//; s/[[:space:]]+#.*$$//; s/[[:space:]]*\r?$$//")"
          export "$$key=$$value"
        }

        load_runtime_env() {
          for key in TOURNAMENT_SWITCHES SNMP_COMMUNITY PLAYER_GATEWAYS PLAYER_GATEWAY_SNMP_COMMUNITY PLAYER_VLAN_IDS PLAYER_REQUIRE_LINK_UP PLAYER_VERIFY_PING LIBRENMS_CORE_IP CORE_SWITCH_PING PLAYER_SUBNETS WIRELESS_SUBNETS PLAYER_STATIC_TARGETS PLAYER_STATIC_NETWORK PLAYER_WIRELESS_SCAN PLAYER_WIRELESS_SCAN_LIMIT PLAYER_WIRELESS_SCAN_TEAM_SIZE PLAYER_WIRELESS_SCAN_TIMEOUT PLAYER_WIRELESS_SCAN_WORKERS PLAYER_WIRELESS_SCAN_MAX_HOSTS PLAYER_WIRELESS_SCAN_EXCLUDE_GATEWAYS PLAYER_WIRELESS_SCAN_EXCLUDE PLAYER_TARGETS_REFRESH_INTERVAL; do
            load_env_key "$$key"
          done
        }

        wait_or_trigger() {
          interval="$${PLAYER_TARGETS_REFRESH_INTERVAL:-300}"
          elapsed=0
          while [ "$$elapsed" -lt "$$interval" ]; do
            sleep 1
            elapsed=$$((elapsed + 1))
            if [ -f /targets/rescan.trigger ]; then
              rm -f /targets/rescan.trigger
              echo "[player-targets] manual rescan triggered"
              return
            fi
          done
        }

        while true; do
          load_runtime_env
          echo "[player-targets] using TOURNAMENT_SWITCHES=$${TOURNAMENT_SWITCHES:-} PLAYER_GATEWAYS=$${PLAYER_GATEWAYS:-$${LIBRENMS_CORE_IP:-}} PLAYER_VLAN_IDS=$${PLAYER_VLAN_IDS:-} PLAYER_SUBNETS=$${PLAYER_SUBNETS:-} WIRELESS_SUBNETS=$${WIRELESS_SUBNETS:-} PLAYER_WIRELESS_SCAN=$${PLAYER_WIRELESS_SCAN:-true}"
          python3 /generate-player-targets.py 2>&1 | while IFS= read -r line; do
            echo "[player-targets] $$line"
          done
          wait_or_trigger
        done

  topology-collector:
    image: python:3-alpine
    container_name: topology-collector
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    networks:
      - monitor
    volumes:
      - topology-data:/targets
      - ./generate-topology-edges.py:/generate-topology-edges.py:ro
      - ./.env:/config/.env:ro
    environment:
      TZ: Asia/Shanghai
      SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      TOPOLOGY_DEVICES: "${TOPOLOGY_DEVICES:-}"
      TOPOLOGY_SNMP_COMMUNITY: "${TOPOLOGY_SNMP_COMMUNITY:-}"
      TOPOLOGY_OUTPUT_DIR: "/targets"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      DIST_SWITCH_PING: "${DIST_SWITCH_PING:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      TOURNAMENT_SWITCHES: "${TOURNAMENT_SWITCHES:-}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache net-snmp-tools
        echo "[topology] starting LLDP collector loop"

        load_env_key() {
          key="$$1"
          [ -f /config/.env ] || return 0
          line="$$(grep -E "^[[:space:]]*$${key}[[:space:]]*=" /config/.env | tail -n 1 || true)"
          [ -n "$$line" ] || return 0
          value="$$(printf '%s' "$$line" | sed -E "s/^[[:space:]]*$${key}[[:space:]]*=[[:space:]]*//; s/[[:space:]]+#.*$$//; s/[[:space:]]*\r?$$//")"
          export "$$key=$$value"
        }

        load_runtime_env() {
          for key in SNMP_COMMUNITY TOPOLOGY_DEVICES TOPOLOGY_SNMP_COMMUNITY CORE_SWITCH_PING DIST_SWITCH_PING FIREWALL_PING TOURNAMENT_SWITCHES TOPOLOGY_REFRESH_INTERVAL; do
            load_env_key "$$key"
          done
        }

        while true; do
          load_runtime_env
          python3 /generate-topology-edges.py 2>&1 | while IFS= read -r line; do
            echo "[topology] $$line"
          done
          sleep "$${TOPOLOGY_REFRESH_INTERVAL:-600}"
        done

  librenms:
    image: librenms/librenms:latest
    container_name: librenms
    restart: unless-stopped
    hostname: librenms
    depends_on:
      librenms-db:
        condition: service_healthy
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      POLLERS: 4
      LIBRENMS_SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-192.168.10.254}"
      LIBRENMS_STAGE_START_OCTET: "${LIBRENMS_STAGE_START_OCTET:-11}"
      LIBRENMS_DISCOVERY_TARGETS: "${LIBRENMS_DISCOVERY_TARGETS:-192.168.10.1-100,192.168.10.254}"
      SNMP_TIMEOUT: "${SNMP_TIMEOUT:-1}"
      SNMP_RETRIES: "${SNMP_RETRIES:-0}"
      LIBRENMS_ADMIN_USER: "${LIBRENMS_ADMIN_USER:-admin}"
      LIBRENMS_ADMIN_PASSWORD: "${LIBRENMS_ADMIN_PASSWORD:-librenms123}"
      LIBRENMS_ADMIN_EMAIL: "${LIBRENMS_ADMIN_EMAIL:-admin@example.com}"
      LIBRENMS_OWN_HOSTNAME: "${SERVER_IP:-}"
      PUID: 1000
      PGID: 1000
    volumes:
      - ./librenms-data:/data
      - ./entrypoint-librenms.sh:/entrypoint-librenms.sh:ro
      - ./librenms-patch-nginx.sh:/librenms-patch-nginx.sh:ro
    entrypoint:
      - /bin/sh
      - /entrypoint-librenms.sh
    ports:
      - "${LIBRENMS_PORT:-8002}:8000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - monitor

  librenms-dispatcher:
    image: librenms/librenms:latest
    container_name: librenms-dispatcher
    hostname: librenms-dispatcher
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      librenms:
        condition: service_started
      librenms-redis:
        condition: service_healthy
      librenms-rrdcached:
        condition: service_started
    volumes:
      - ./librenms-data:/data
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      DISPATCHER_NODE_ID: "${LIBRENMS_DISPATCHER_NODE_ID:-dispatcher1}"
      SIDECAR_DISPATCHER: 1
      PUID: 1000
      PGID: 1000
    networks:
      - monitor

  librenms-config:
    image: librenms/librenms:latest
    container_name: librenms-config
    depends_on:
      librenms:
        condition: service_started
      librenms-dispatcher:
        condition: service_started
    networks:
      - monitor
    restart: "no"
    volumes:
      - ./librenms-data:/data
      - ./librenms-auto-config.sh:/librenms-auto-config.sh:ro
    environment:
      TZ: Asia/Shanghai
      DB_HOST: librenms-db
      DB_NAME: librenms
      DB_USER: librenms
      DB_PASSWORD: librenms
      DB_PASS: librenms
      DB_TIMEOUT: 120
      SERVER_IP: "${SERVER_IP:-}"
      LIBRENMS_PORT: "${LIBRENMS_PORT:-8002}"
      LIBRENMS_BASE_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      APP_URL: "${LIBRENMS_BASE_URL:-http://${SERVER_IP:-localhost}:${LIBRENMS_PORT:-8002}}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: librenms-redis
      REDIS_PORT: 6379
      RRDCACHED_SERVER: librenms-rrdcached:42217
      LIBRENMS_SNMP_COMMUNITY: "${SNMP_COMMUNITY:-global}"
      CORE_SWITCH_PING: "${CORE_SWITCH_PING:-}"
      LIBRENMS_CORE_IP: "${LIBRENMS_CORE_IP:-}"
      LIBRENMS_STAGE_START_OCTET: "${LIBRENMS_STAGE_START_OCTET:-11}"
      LIBRENMS_DISCOVERY_TARGETS: "${LIBRENMS_DISCOVERY_TARGETS:-192.168.10.1-100,192.168.10.254}"
      SNMP_TIMEOUT: "${SNMP_TIMEOUT:-1}"
      SNMP_RETRIES: "${SNMP_RETRIES:-0}"
      LIBRENMS_ADMIN_USER: "${LIBRENMS_ADMIN_USER:-admin}"
      LIBRENMS_ADMIN_PASSWORD: "${LIBRENMS_ADMIN_PASSWORD:-librenms123}"
      LIBRENMS_ADMIN_EMAIL: "${LIBRENMS_ADMIN_EMAIL:-admin@example.com}"
      LIBRENMS_OWN_HOSTNAME: "${SERVER_IP:-}"
      FIREWALL_DISCOVERY_RANGE: "${FIREWALL_DISCOVERY_RANGE:-}"
      FIREWALL_SNMP_COMMUNITY: "${FIREWALL_SNMP_COMMUNITY:-${SNMP_COMMUNITY:-public}}"
      FIREWALL_SNMP_TARGETS: "${FIREWALL_SNMP_TARGETS:-}"
      FEISHU_ROBOT_TOKEN: "${FEISHU_ROBOT_TOKEN:-}"
      ISP_PING: "${ISP_PING:-}"
      FIREWALL_PING: "${FIREWALL_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      ISP_SATURATION_PERCENT: "${ISP_SATURATION_PERCENT:-80}"
      FIREWALL_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
      LIBRENMS_API_TOKEN: "${LIBRENMS_API_TOKEN:-}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for LibreNMS to fully initialize..."
        sleep 30
        echo "Running LibreNMS auto-configuration..."
        /bin/sh /librenms-auto-config.sh
        echo ""
        echo "UniFi APs: Add via SNMP in LibreNMS web UI (http://localhost:8002)"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-root}"
      GF_SECURITY_ALLOW_EMBEDDING: "${GRAFANA_ALLOW_EMBEDDING:-true}"
      GF_AUTH_ANONYMOUS_ENABLED: "${GRAFANA_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "${GRAFANA_ANONYMOUS_ORG_ROLE:-Viewer}"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_PROTOCOL: http
      GF_DEFAULT_LOCALE: zh-Hans
      GF_DEFAULT_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning-rendered:/etc/grafana/provisioning:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      prometheus:
        condition: service_healthy
    networks:
      - monitor

  bigscreen:
    image: nginx:alpine
    container_name: bigscreen
    restart: unless-stopped
    environment:
      BIGSCREEN_EVENT_NAME: "${EVENT_NAME:-}"
      BIGSCREEN_TITLE: "${BIGSCREEN_TITLE:-}"
      BIGSCREEN_SUBTITLE: "${BIGSCREEN_SUBTITLE:-}"
      BIGSCREEN_LOGO_TEXT: "${BIGSCREEN_LOGO_TEXT:-}"
      BIGSCREEN_PROMETHEUS_BASE_URL: "${BIGSCREEN_PROMETHEUS_BASE_URL:-}"
      BIGSCREEN_ISP_NAMES: "${BIGSCREEN_ISP_NAMES:-}"
      BIGSCREEN_ISP_IPS: "${BIGSCREEN_ISP_IPS:-}"
      BIGSCREEN_ISP_AUTO_DISCOVER: "${BIGSCREEN_ISP_AUTO_DISCOVER:-true}"
      BIGSCREEN_ISP_MAX_BANDWIDTH: "${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}"
      ISP_PING: "${ISP_PING:-}"
      SERVER_PING: "${SERVER_PING:-}"
      BIGSCREEN_STAGE_DEVICE_FILTER: "${BIGSCREEN_STAGE_DEVICE_FILTER:-stage,wutai,舞台}"
      BIGSCREEN_WAN_IF_FILTER: "${FIREWALL_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
    volumes:
      - ./bigscreen:/app:ro
      - topology-data:/srv/topology:ro
    ports:
      - "${BIGSCREEN_PORT:-8088}:80"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitor
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -r /app/. /usr/share/nginx/html/
        cat > /usr/share/nginx/html/config.js <<EOF
        window.BIGSCREEN_CONFIG = {
          eventName: "$${BIGSCREEN_EVENT_NAME:-}",
          title: "$${BIGSCREEN_TITLE:-}",
          subtitle: "$${BIGSCREEN_SUBTITLE:-}",
          logoText: "$${BIGSCREEN_LOGO_TEXT:-}",
          prometheusBaseUrl: "$${BIGSCREEN_PROMETHEUS_BASE_URL:-}",
          ispNames: "$${BIGSCREEN_ISP_NAMES:-}",
          ispIps: "$${BIGSCREEN_ISP_IPS:-$${ISP_PING:-}}",
          ispAutoDiscovery: "$${BIGSCREEN_ISP_AUTO_DISCOVER:-true}",
          ispMaxBandwidthMbps: "$${BIGSCREEN_ISP_MAX_BANDWIDTH:-1000}",
          serverTargets: "$${SERVER_PING:-}",
          stageDeviceFilter: "$${BIGSCREEN_STAGE_DEVICE_FILTER:-stage,wutai,舞台}",
          wanIfFilter: "$${BIGSCREEN_WAN_IF_FILTER:-telecom,telcom,unicom,isp,WAN}"
        };
        EOF
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /app;
          add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;

          location = /config.js {
            alias /usr/share/nginx/html/config.js;
          }

          location / {
            try_files $$uri $$uri/ /index.html;
          }

          location /prometheus/ {
            # 用 Docker 内嵌 DNS（127.0.0.11）运行时解析 prometheus，避免其容器重建后
            # 换了 IP、而 nginx 仍缓存旧 IP 导致 502。写死主机名的 proxy_pass 只在 nginx
            # 启动时解析一次；用变量 + resolver 可强制每 30s 重新解析。
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $$prom_upstream prometheus;
            rewrite ^/prometheus/(.*)$$ /$$1 break;
            proxy_pass http://$$prom_upstream:9090;
          }

          location /topology/ {
            alias /srv/topology/;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            try_files $$uri =404;
          }

          location /player-targets/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $$pt_upstream player-targets;
            rewrite ^/player-targets/(.*)$$ /$$1 break;
            proxy_pass http://$$pt_upstream:9199;
            proxy_read_timeout 5s;
          }
        }
        EOF
        exec nginx -g 'daemon off;'

  grafana-setup:
    image: alpine:latest
    container_name: grafana-setup
    environment:
      GRAFANA_USER: "${GRAFANA_USER:-admin}"
      GRAFANA_PASSWORD: "${GRAFANA_PASSWORD:-root}"
    depends_on:
      grafana:
        condition: service_started
      prometheus:
        condition: service_healthy
    networks:
      - monitor
    restart: on-failure
    volumes:
      - ./grafana-setup.sh:/grafana-setup.sh:ro
    command: ["/bin/sh", "-c", "sleep 30 && /bin/sh /grafana-setup.sh"]

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - monitor

  rsyslog:
    image: alpine:latest
    container_name: rsyslog
    restart: unless-stopped
    command: ["sh", "-c", "apk add --no-cache rsyslog && exec rsyslogd -n -f /etc/rsyslog.conf"]
    volumes:
      - ./rsyslog.conf:/etc/rsyslog.conf:ro
      - syslog-spool:/var/log/remote
    ports:
      - "${SYSLOG_PORT:-514}:514/udp"
      - "${SYSLOG_PORT:-514}:514/tcp"
    networks:
      - monitor

  promtail-syslog:
    image: grafana/promtail:2.9.8
    container_name: promtail-syslog
    restart: unless-stopped
    user: "0"
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - syslog-spool:/var/log/remote:ro
      - promtail-data:/promtail
    depends_on:
      - loki
      - rsyslog
    networks:
      - monitor

networks:
  monitor:
    driver: bridge

volumes:
  loki-data:
  syslog-spool:
  promtail-data:
  prometheus-data:
  player-targets-data:
  topology-data:
  grafana-data:
  librenms-db-data:
  librenms-data:

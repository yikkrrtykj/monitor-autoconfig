<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>网络监控大屏</title>
    <link rel="stylesheet" href="./style.css?v=20260623b" />
    <link rel="stylesheet" href="./platform.css?v=20260718c" />
  </head>
  <body>
    <main class="screen">
      <header class="topbar">
        <div class="brand" id="brand">
          <div class="brand-mark" id="brandMark" aria-hidden="true"></div>
          <div class="brand-text" id="logoText"></div>
        </div>
        <div class="headline">
          <h1 id="screenTitle">网络监控大屏</h1>
          <div id="screenSubtitle" class="subtitle"></div>
          <nav class="screen-nav" id="screenNav" aria-label="页面导航"></nav>
        </div>
        <time class="clock" aria-live="polite">
          <span id="dateText">---- -- --</span>
          <strong id="timeText">--:--:--</strong>
          <span id="dataFreshness" class="data-freshness" hidden></span>
        </time>
      </header>

      <section class="panel-grid" id="panelGrid" aria-label="监控面板">
        <section class="panel custom-panel ping-panel" aria-labelledby="pingTitle">
          <h2 id="pingTitle">Ping</h2>
          <div class="gauge-subhead">网络设备</div>
          <div class="gauge-grid" id="pingGaugeGrid"></div>
          <div id="serverGaugesWrap">
            <div class="gauge-subhead">服务器</div>
            <div class="gauge-grid" id="pingServerGaugeGrid"></div>
          </div>
        </section>
        <section class="panel custom-panel uptime-panel" aria-labelledby="uptimeTitle">
          <h2 id="uptimeTitle">运行时长</h2>
          <div class="gauge-grid" id="uptimeGaugeGrid"></div>
        </section>
        <section class="chart-panel trend-panel" aria-labelledby="trendTitle">
          <h2 id="trendTitle">Ping 趋势</h2>
          <div class="chart-body" id="pingTrendChart"></div>
        </section>
        <section class="chart-panel loss-panel" aria-labelledby="lossTitle">
          <h2 id="lossTitle">丢包热力图</h2>
          <div class="chart-body" id="lossHeatmap"></div>
        </section>
        <div class="isp-grid" id="ispGrid"></div>
      </section>
      <section class="home-panel" id="homePanel" aria-label="大屏选择" hidden>
        <div class="home-shell">
          <div class="mode-grid" id="modeGrid"></div>
        </div>
      </section>
      <section class="tournament-panel" id="tournamentPanel" aria-label="比赛面板" hidden>
        <button type="button" class="tournament-refresh" id="tournamentRefresh" title="刷新" aria-label="手动刷新比赛面板">↻</button>
        <div class="tournament-summary" id="tournamentSummary"></div>
        <div class="tournament-board" id="tournamentBoard"></div>
        <section class="chart-panel tournament-trend-panel" aria-labelledby="tournamentTrendTitle">
          <h2 id="tournamentTrendTitle">选手延迟趋势</h2>
          <div class="chart-body" id="tournamentTrendChart"></div>
        </section>
      </section>
      <section class="evidence-panel" id="evidencePanel" aria-label="延迟查询" hidden>
        <form class="evidence-controls" id="evidenceForm">
          <label>队伍 <input id="evidenceTeam" type="number" min="1" max="16" value="1" /></label>
          <label>座位 <input id="evidenceSeat" type="number" min="1" max="5" value="1" /></label>
          <label>网络
            <select id="evidenceNetwork">
              <option value="wired">有线</option>
              <option value="wireless">无线</option>
              <option value="all">全部</option>
            </select>
          </label>
          <label>IP（填了优先按 IP 查，可查选手或基础设施任意设备） <input id="evidenceIp" type="text" /></label>
          <label>查询时间 <input id="evidenceAt" type="datetime-local" /></label>
          <label title="以“查询时间”为中心的总时间窗">查询范围
            <select id="evidenceWindow">
              <option value="5">5 分钟</option>
              <option value="10" selected>10 分钟</option>
              <option value="30">30 分钟</option>
            </select>
          </label>
          <button type="submit">查询</button>
          <button type="button" id="evidenceExport" title="把当前查询到的延迟/在线原始数据导出为 CSV">导出 CSV</button>
        </form>
        <div class="evidence-summary" id="evidenceSummary"></div>
        <section class="chart-panel evidence-latency-panel" aria-labelledby="evidenceLatencyTitle">
          <h2 id="evidenceLatencyTitle">延迟趋势</h2>
          <div class="chart-body" id="evidenceLatencyChart"></div>
        </section>
        <section class="chart-panel evidence-success-panel" aria-labelledby="evidenceSuccessTitle">
          <h2 id="evidenceSuccessTitle">在线状态</h2>
          <div class="chart-body" id="evidenceSuccessChart"></div>
        </section>
      </section>
      <section class="ops-panel" id="opsPanel" aria-label="现场核对" hidden>
        <button type="button" class="tournament-refresh" id="opsRescan" title="立即重扫目标" aria-label="立即重扫目标">↻</button>
        <div class="ops-controls" id="opsControls"></div>
        <div class="ops-summary" id="opsSummary"></div>
        <div class="ops-board" id="opsBoard"></div>
      </section>
      <section class="control-panel" id="controlPanel" aria-label="赛事控制台" hidden>
        <div class="control-auth" id="controlAuth" hidden>
          <section class="auth-card" aria-labelledby="controlAuthTitle">
            <div class="auth-heading">
              <strong id="controlAuthTitle">赛事控制台登录</strong>
              <span id="controlAuthHint">输入账号密码后继续</span>
            </div>
            <form class="auth-form" id="controlLoginForm">
              <label>账号
                <input id="controlLoginUser" type="text" autocomplete="username" placeholder="admin" />
              </label>
              <label>密码
                <input id="controlLoginPassword" type="password" autocomplete="current-password" />
              </label>
              <button type="submit">登录</button>
            </form>
            <form class="auth-form" id="controlPasswordForm" hidden>
              <label>当前密码
                <input id="controlCurrentPassword" type="password" autocomplete="current-password" />
              </label>
              <label>新密码
                <input id="controlNewPassword" type="password" autocomplete="new-password" />
              </label>
              <label>确认新密码
                <input id="controlConfirmPassword" type="password" autocomplete="new-password" />
              </label>
              <button type="submit">修改密码并进入</button>
            </form>
            <div class="auth-message" id="controlAuthMessage"></div>
          </section>
        </div>
        <div class="control-shell" id="controlShell">
          <div class="control-toolbar">
            <div class="control-title">
              <strong>赛事控制台</strong>
              <span>基础配置、问题清单、事故和赛前工具</span>
            </div>
            <div class="control-actions">
              <button type="button" id="controlRescan" title="立即重扫座位目标">重扫</button>
              <button type="button" id="controlRefresh" title="刷新控制台">刷新</button>
              <button type="button" id="controlLogout" title="退出赛事控制台">退出</button>
            </div>
          </div>
          <div class="control-grid">
            <div class="control-stack control-stack-left">
              <article class="control-card control-readiness-card">
                <h2>需要关注</h2>
                <div class="readiness-missing" id="controlReadinessMissing"></div>
              </article>
              <article class="control-card control-config-editor-card">
                <h2>基础配置</h2>
                <div class="control-form" id="controlConfigForm"></div>
                <div class="control-button-row">
                  <button type="button" id="controlConfigValidate">验证</button>
                  <button type="button" id="controlConfigSave">保存</button>
                  <button type="button" id="controlConfigApply">应用配置</button>
                  <button type="button" id="controlConfigRollback">回滚</button>
                  <button type="button" id="controlConfigImport">导入配置</button>
                  <a id="controlConfigExport" href="/platform-api/config/download">导出配置</a>
                  <input id="controlConfigImportFile" type="file" accept=".yml,.yaml,text/yaml" hidden />
                </div>
                <div class="control-list" id="controlConfigResult"></div>
              </article>
            </div>
            <div class="control-stack control-stack-right">
              <article class="control-card">
                <h2>配置中心</h2>
                <div class="control-config" id="controlConfig"></div>
              </article>
              <article class="control-card">
                <h2>拓扑诊断</h2>
                <div class="control-list" id="controlTopology"></div>
              </article>
              <article class="control-card">
                <h2>事故流转</h2>
                <div class="control-flow" id="controlIncidentFlow"></div>
              </article>
              <article class="control-card">
                <h2>事故库</h2>
                <div class="incident-create">
                  <input id="controlIncidentTitle" type="text" placeholder="事故标题" />
                  <button type="button" id="controlIncidentCreate">创建</button>
                </div>
                <div class="control-list" id="controlIncidentList"></div>
              </article>
              <article class="control-card control-lint-card">
                <h2>交换机配置巡检</h2>
                <div class="lint-panes">
                  <div class="lint-pane">
                    <label class="lint-pane-label">核心交换机</label>
                    <textarea class="control-textarea" id="controlCoreConfig" spellcheck="false" placeholder="粘贴核心 show run 片段"></textarea>
                  </div>
                  <div class="lint-pane">
                    <label class="lint-pane-label">分线交换机</label>
                    <textarea class="control-textarea" id="controlSwitchConfig" spellcheck="false" placeholder="粘贴当前分线 show run 片段，核对后换下一台"></textarea>
                  </div>
                </div>
                <div class="control-list" id="controlLintResult"></div>
              </article>
              <article class="control-card">
                <h2>赛前工具</h2>
                <div class="control-list" id="controlDelivery"></div>
              </article>
            </div>
          </div>
        </div>
      </section>
      <section class="dhcp-panel" id="dhcpPanel" aria-label="DHCP 地址池" hidden>
        <div class="dhcp-toolbar">
          <div>
            <strong>核心交换机 DHCP</strong>
            <span id="dhcpConnection">等待读取核心配置</span>
          </div>
          <span class="dhcp-actions">
            <span id="dhcpBindingsStatus">进入页面后自动查询已用 IP</span>
            <button type="button" id="dhcpBindings" title="重新读取 show ip dhcp binding 并标出已租用地址">重新查询已用 IP</button>
            <button type="button" id="dhcpRefresh" title="立即从核心交换机刷新">立即刷新</button>
          </span>
        </div>
        <div class="dhcp-status" id="dhcpStatus">打开页面后自动读取，离开页面即停止刷新。</div>
        <div class="dhcp-summary" id="dhcpSummary"></div>
        <div class="dhcp-pools" id="dhcpPools"></div>
        <div class="dhcp-footnote" id="dhcpFootnote"></div>
      </section>
      <section class="topology-panel" id="topologyPanel" aria-label="网络拓扑" hidden>
        <div class="topology-toolbar">
          <span class="topology-legend">
            <i class="dot good"></i> 在线
            <i class="dot warn"></i> 高延迟
            <i class="dot bad"></i> 离线
            <i class="dot none"></i> 无数据
          </span>
          <span class="topology-updated" id="topologyUpdated"></span>
        </div>
        <div class="topology-canvas" id="topologyCanvas"></div>
        <aside class="topology-detail" id="topologyDetail"></aside>
      </section>
      <section class="incident-panel" id="incidentPanel" aria-label="卡顿根因分析" hidden>
        <form class="incident-controls" id="incidentForm">
          <label>事发时间 <input id="incidentAt" type="datetime-local" /></label>
          <label>分析窗口
            <select id="incidentWindow">
              <option value="2">前后 2 分钟</option>
              <option value="5" selected>前后 5 分钟</option>
              <option value="10">前后 10 分钟</option>
              <option value="15">前后 15 分钟</option>
            </select>
          </label>
          <label>抖动阈值
            <select id="incidentThreshold">
              <option value="0.02">20 ms</option>
              <option value="0.03">30 ms</option>
              <option value="0.05" selected>50 ms（推荐）</option>
              <option value="0.08">80 ms</option>
            </select>
          </label>
          <button type="submit">分析</button>
        </form>
        <div class="incident-verdict" id="incidentVerdict"></div>
        <section class="incident-grid">
          <article class="incident-card" aria-labelledby="incidentPlayersTitle">
            <h2 id="incidentPlayersTitle">受影响选手</h2>
            <div class="incident-card-body" id="incidentPlayers"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentInfraTitle">
            <h2 id="incidentInfraTitle">基础设施</h2>
            <div class="incident-card-body" id="incidentInfra"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentIspTitle">
            <h2 id="incidentIspTitle">ISP / WAN 流量</h2>
            <div class="incident-card-body" id="incidentIsp"></div>
          </article>
          <article class="incident-card" aria-labelledby="incidentStageTitle">
            <h2 id="incidentStageTitle">按 Stage 分组</h2>
            <div class="incident-card-body" id="incidentStage"></div>
          </article>
        </section>
      </section>
    </main>
    <script src="./config.js?v=20260623a"></script>
    <script src="./pages.js?v=20260717b"></script>
    <script src="./utils.js?v=20260623a"></script>
    <script src="./api.js?v=20260718c"></script>
    <script src="./players.js?v=20260623a"></script>
    <script src="./incident.js?v=20260623a"></script>
    <script src="./topology.js?v=20260623a"></script>
    <script src="./platform.js?v=20260627a"></script>
    <script src="./app.js?v=20260718c"></script>
  </body>
</html>
